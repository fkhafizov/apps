Demo uses the **classic greedy pancake sorting algorithm** (also known as "sorting by prefix reversals"). Let me explain the algorithm and its complexity bounds:

## The Greedy Algorithm

The algorithm works by repeatedly:
1. Find the largest unsorted pancake
2. Flip it to the top (if not already there)
3. Flip it to its final position at the bottom of the unsorted portion
4. Repeat for remaining unsorted pancakes

## Theoretical Bounds

**For this specific greedy algorithm:**
- **Upper bound:** $2(n-1) = 2n - 2$ flips
  - Worst case: each of $(n-1)$ pancakes requires 2 flips
  - One flip to bring it to the top, one to place it in position

**For optimal pancake sorting (general problem):**
- **Lower bound:** At least $n - 1$ flips needed for some permutations
- **Best known upper bound:** $\\frac{18n}{11} + O(1)$ (Chitturi et al., 2009)
- **Tight lower bound:** $\\lceil\\frac{15n}{14}\\rceil$ (Gates & Papadimitriou, 1979)


### Known Pancake Numbers $P(n)$
The exact pancake number $P(n)$ (maximum flips needed for any permutation of size $n$) is only known for small values.
The maximum flips needed for **any** permutation of size $n$:
- $P(1) = 0$
- $P(2) = 1$
- $P(3) = 3$
- $P(4) = 4$
- $P(5) = 5$
- $P(6) = 7$
- $P(7) = 8$
- $P(8) = 9$
- $P(9) = 10$
- $P(10) = 11$

For larger $n$, we know: $\\frac{15n}{14} \\leq P(n) \\leq \\frac{18n}{11} + O(1)$

## Here's the complete algorithm analysis:

The greedy algorithm works by selection sort with flips:
1. Find the largest unsorted pancake
2. If not at top: flip to bring it to position 0
3. Flip to move it to its final position at the bottom
4. Repeat for remaining $(n-1), (n-2), ..., 2$ positions

## Complexity Bounds

### Upper Bound (This Algorithm)
**$2(n-1)$ flips maximum**

In the worst case, each of the $(n-1)$ pancakes needs exactly 2 flips:
- 1 flip to bring it to the top
- 1 flip to place it in final position

This gives: $2(n-1) = 2n - 2$ flips

### Lower Bound (Any Algorithm)
**At least $(n-1)$ flips required**

Some permutations require at least $(n-1)$ flips. The theoretical lower bound for worst-case pancake sorting is $\\lceil\\frac{15n}{14}\\rceil$ (Gates & Papadimitriou, 1979).

# ML/RL approach for estimating $P(N)$

* [Cayley_Pancake_Initial_state_distance.ipynb](https://colab.research.google.com/drive/1k3-CapxAf9nf4AldyE9dk1B_HHeRluNM?usp=sharing)

This is a sophisticated approach to pancake sorting using **machine learning-guided beam search** on **Cayley graphs**. 

## Overview: ML-Guided Search on Cayley Graphs

This notebook uses a fundamentally different approach from my simple greedy algorithm. Instead of a deterministic greedy strategy, it combines:
1. **Graph theory** (Cayley graphs)
2. **Machine learning** (neural network heuristic)
3. **Informed search** (beam search)

## Key Components

### 1. **Cayley Graph Representation**
\`\`\`python
graph = CayleyGraph(
    PermutationGroups.pancake(n).make_inverse_closed().with_central_state(central),
    ...
)
\`\`\`

The pancake sorting problem is modeled as a **Cayley graph** where:
- **Nodes**: All possible permutations of size $n$ (there are $n!$ nodes)
- **Edges**: Connections between permutations that differ by one flip operation
- **Generators**: The $n-1$ possible flip operations (flip positions 1 through $n-1$)
- **Goal**: Find shortest path from start permutation to identity permutation

This is the **exact mathematical structure** of the pancake sorting problem!

### 2. **Neural Network Heuristic**
The notebook trains a neural network to estimate the **distance to target** (similar to an A* heuristic):

\`\`\`python
model_type = "MLPRes1"  # Multi-layer perceptron with residual blocks
\`\`\`

The model:
- **Input**: A permutation (encoded as one-hot vectors)
- **Output**: Estimated distance to the sorted state
- **Architecture**: 512→256 hidden dims with 4 residual blocks and dropout

### 3. **Training via Random Walks**
\`\`\`python
X, y = graph.random_walks(
    width=2500,
    length=calculated_depth,
    mode="nbt",  # "Never Back Track" mode
    ...
)
\`\`\`

Training data generation:
- Performs random walks on the Cayley graph
- Each walk generates (permutation, true_distance) pairs
- "nbt" mode prevents immediate reversals (more efficient exploration)
- Walk length: $\\frac{n(n+5)}{4(k-1)} + 30$ where $k=4$

### 4. **Beam Search with ML Guidance**
\`\`\`python
res = graph.beam_search(
    start_state=start_state,
    beam_width=[2^10, 2^16],  # Try different beam widths
    predictor=Predictor(graph, model),
    ...
)
\`\`\`

The search:
- Maintains top-$k$ most promising states at each step
- Uses the trained model to score which states are closest to goal
- Tries beam widths of 1024 and 65536
- Much more efficient than BFS but still finds optimal/near-optimal solutions

## Mathematical Insight

This approach leverages the fact that:
1. Pancake sorting is equivalent to finding shortest paths in the pancake graph (a Cayley graph)
2. The diameter of this graph (maximum shortest path) is $P(n)$ - the pancake number
3. ML can learn to approximate distances in this graph, making search tractable
