<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schreier (5,2) — Wave (Stanley–Edelman–Greene)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            background: linear-gradient(180deg, #c8e6c9 0%, #b3e5fc 100%);
        }
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 42px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.08);
            z-index: 101;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }
        #header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            color: #2e7d32;
        }
        #header-btns {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #pic-btn {
            padding: 8px 20px;
            font-size: 0.85rem;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            background: linear-gradient(135deg, #2196f3 0%, #9c27b0 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(33, 150, 243, 0.35);
        }
        #pic-btn {
            background: linear-gradient(135deg, #546e7a 0%, #37474f 100%);
            box-shadow: 0 2px 8px rgba(84, 110, 122, 0.35);
        }
        #pic-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(84, 110, 122, 0.45);
        }
        #eg-toggle, #logs-toggle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            color: #37474f;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            user-select: none;
        }
        #eg-check, #logs-check {
            accent-color: #2196f3;
            width: 15px;
            height: 15px;
            cursor: pointer;
        }
        #logs-panel {
            position: fixed;
            bottom: 16px;
            right: 12px;
            width: 420px;
            height: 300px;
            background: rgba(38,50,56,0.95);
            backdrop-filter: blur(12px);
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }
        #logs-panel.hidden { display: none; }
        #logs-panel .logs-header {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.65rem;
            color: #90a4ae;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 12px 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #logs-panel .logs-clear {
            font-size: 0.6rem;
            color: #78909c;
            background: none;
            border: 1px solid #546e7a;
            border-radius: 4px;
            padding: 2px 8px;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
        }
        #logs-panel .logs-clear:hover { color: #e0e0e0; border-color: #90a4ae; }
        #logs-textarea {
            flex: 1;
            background: transparent;
            color: #e0e0e0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.68rem;
            line-height: 1.6;
            border: none;
            outline: none;
            resize: none;
            padding: 6px 12px 10px;
            overflow-y: auto;
        }
        #path-panel {
            position: fixed;
            top: 52px;
            left: 12px;
            width: 300px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            padding: 12px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.6);
        }
        #path-panel h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.7rem;
            color: #546e7a;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .path-btn {
            display: block;
            width: 100%;
            margin-bottom: 6px;
            padding: 8px 10px;
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
            text-align: left;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            color: #37474f;
            transition: all 0.2s ease;
        }
        .path-btn:hover {
            background: #e8f5e9;
            border-color: #66bb6a;
        }
        .path-btn.selected {
            background: linear-gradient(135deg, #e8f5e9 0%, #e3f2fd 100%);
            border-color: #2196f3;
            font-weight: 600;
            color: #1565c0;
        }
        .path-btn .path-preview {
            font-size: 0.6rem;
            color: #78909c;
            margin-top: 4px;
            line-height: 1.3;
        }
        #ref-panel {
            position: fixed;
            top: 52px;
            right: 12px;
            width: 300px;
            max-height: 50vh;
            overflow: auto;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.6);
        }
        #ref-panel.hidden {
            display: none;
        }
        #ref-panel h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.7rem;
            color: #546e7a;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #ref-panel img {
            width: 100%;
            height: auto;
            border-radius: 6px;
            display: block;
        }
        #wave-legend {
            position: fixed;
            bottom: 16px;
            left: 20px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            padding: 10px 12px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            z-index: 100;
            font-size: 0.6rem;
            color: #546e7a;
            border: 1px solid rgba(255,255,255,0.6);
        }
        #wave-legend .wave-item {
            display: flex;
            align-items: center;
            margin-bottom: 2px;
        }
        #wave-legend .wave-item:last-child { margin-bottom: 0; }
        #wave-legend .wave-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
            flex-shrink: 0;
        }
        #tableau-panel.hidden {
            display: none;
        }
        #tableau-panel {
            position: fixed;
            left: 12px;
            width: 300px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            padding: 12px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.6);
        }
        #tableau-panel h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.7rem;
            color: #546e7a;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #reduced-word {
            font-size: 0.72rem;
            color: #37474f;
            margin-bottom: 10px;
            line-height: 1.5;
        }
        #reduced-word .rw-label {
            font-size: 0.62rem;
            color: #78909c;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            display: block;
            margin-bottom: 2px;
        }
        .tableau-row-container {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .tableau-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .tableau-wrap .tab-label {
            font-size: 0.58rem;
            color: #90a4ae;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .young-tableau {
            display: flex;
            flex-direction: column;
            gap: 0px;
        }
        .young-tableau .yt-row {
            display: flex;
            gap: 0px;
        }
        .young-tableau .yt-cell {
            width: 30px;
            height: 30px;
            border: 2px solid #90a4ae;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: #263238;
            background: #fff;
            margin-right: -2px;
            margin-bottom: -2px;
        }
        .young-tableau .yt-row:first-child .yt-cell {
            border-top-color: #546e7a;
        }
        .young-tableau .yt-row .yt-cell:first-child {
            border-left-color: #546e7a;
        }
        .young-tableau .yt-cell.yt-highlight {
            background: #e3f2fd;
            border-color: #1565c0;
            color: #0d47a1;
        }
        #canvas-container {
            position: fixed;
            top: 42px;
            left: 0;
            width: 100%;
            height: calc(100% - 42px);
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>⬡ Schreier (5,2) — Stringy path (Stanley–Edelman–Greene)</h1>
        <div id="header-btns">
            <label id="eg-toggle"><input type="checkbox" id="eg-check" onchange="toggleEG()"> EG tableau</label>
            <label id="logs-toggle"><input type="checkbox" id="logs-check" onchange="toggleLogs()"> Logs</label>
            <button id="pic-btn" onclick="togglePic()">PIC (show)</button>
        </div>
    </div>
    <div id="path-panel">
        <h3>Shortest paths 00101 → 10100</h3>
        <button class="path-btn selected" id="path-btn-0" onclick="selectPath(0)">Path 1<div class="path-preview" id="path-preview-0"></div></button>
        <button class="path-btn" id="path-btn-1" onclick="selectPath(1)">Path 2<div class="path-preview" id="path-preview-1"></div></button>
        <button class="path-btn" id="path-btn-2" onclick="selectPath(2)">Path 3<div class="path-preview" id="path-preview-2"></div></button>
        <button class="path-btn" id="path-btn-3" onclick="selectPath(3)">Path 4<div class="path-preview" id="path-preview-3"></div></button>
        <button class="path-btn" id="path-btn-4" onclick="selectPath(4)">Path 5<div class="path-preview" id="path-preview-4"></div></button>
    </div>
    <div id="tableau-panel" class="hidden">
        <h3>Edelman–Greene correspondence</h3>
        <div id="reduced-word"></div>
        <div class="tableau-row-container">
            <div class="tableau-wrap">
                <div class="tab-label">Insertion P</div>
                <div id="tableau-p" class="young-tableau"></div>
            </div>
            <div class="tableau-wrap">
                <div class="tab-label">Recording Q</div>
                <div id="tableau-q" class="young-tableau"></div>
            </div>
        </div>
    </div>
    <div id="ref-panel" class="hidden">
        <h3>Reference: schreier_5_2.jpg</h3>
        <img src="schreier_5_2.jpg" alt="Schreier 5,2 stringy interpretation">
    </div>
    <div id="wave-legend">
        <div style="font-weight:600;margin-bottom:6px;color:#37474f;">Vertex colors</div>
        <div class="wave-item"><span class="wave-dot" style="background:#e53935"></span>00101</div>
        <div class="wave-item"><span class="wave-dot" style="background:#1565c0"></span>01001</div>
        <div class="wave-item"><span class="wave-dot" style="background:#9c27b0"></span>00110</div>
        <div class="wave-item"><span class="wave-dot" style="background:#43a047"></span>01010</div>
        <div class="wave-item"><span class="wave-dot" style="background:#bf360c"></span>01100</div>
        <div class="wave-item"><span class="wave-dot" style="background:#6a1b9a"></span>10001</div>
        <div class="wave-item"><span class="wave-dot" style="background:#fdd835"></span>10010</div>
        <div class="wave-item"><span class="wave-dot" style="background:#00acc1"></span>10100</div>
    </div>
    <div id="logs-panel" class="hidden">
        <div class="logs-header">
            <span>Logs</span>
            <button class="logs-clear" onclick="clearLogs()">Clear</button>
        </div>
        <textarea id="logs-textarea" readonly></textarea>
    </div>
    <div id="canvas-container"></div>

    <script>
        const N = 5;
        const K = 2;
        const NODE_SIZE = 36;

        // All 5 shortest paths from 00101 to 10100 (length 4 edges, 5 vertices each)
        const ALL_PATHS = [
            ['00101', '01001', '01010', '10010', '10100'],
            ['00101', '00110', '01010', '10010', '10100'],
            ['00101', '01001', '10001', '10010', '10100'],
            ['00101', '01001', '01010', '01100', '10100'],
            ['00101', '00110', '01010', '01100', '10100'],
        ];

        // Color per vertex label (used on canvas and in path preview)
        const LABEL_COLORS = {
            '00101': '#e53935',  // red
            '01001': '#1565c0',   // blue
            '00110': '#9c27b0',   // purple
            '01010': '#43a047',   // green
            '01100': '#bf360c',   // deep orange
            '10001': '#6a1b9a',   // deep purple
            '10010': '#fdd835',   // yellow
            '10100': '#00acc1',   // cyan
        };

        let nodes = [];
        let edges = [];
        let labelToNode = new Map();
        let bounds, canvasLeft, canvasRight, canvasTop, canvasBottom;
        let cellWidth, cellHeight;

        let selectedPathIndex = 0;

        function currentPath() {
            return ALL_PATHS[selectedPathIndex];
        }

        // Wave animation state
        let waveRunning = false;
        let waveCompleted = false;
        let waveStepIndex = 0;
        let arrowProgress = 0;
        const ARROW_SPEED = 0.028;
        const WAVE_AMPLITUDE = 18;
        const WAVE_FREQUENCY = 4;

        function getCanvasBounds() {
            const padding = 20;
            const leftPanelWidth = 300 + 12;
            return {
                left: leftPanelWidth + padding,
                right: windowWidth - 50 - padding,
                top: 52 + 50 + padding,
                bottom: windowHeight - 30 - padding,
            };
        }

        function toggleLogs() {
            const panel = document.getElementById('logs-panel');
            const checked = document.getElementById('logs-check').checked;
            if (checked) {
                panel.classList.remove('hidden');
            } else {
                panel.classList.add('hidden');
            }
        }

        function clearLogs() {
            document.getElementById('logs-textarea').value = '';
        }

        function appendLog(text) {
            if (!document.getElementById('logs-check').checked) return;
            const ta = document.getElementById('logs-textarea');
            ta.value += text + '\n';
            ta.scrollTop = ta.scrollHeight;
        }

        function toggleEG() {
            const panel = document.getElementById('tableau-panel');
            const checked = document.getElementById('eg-check').checked;
            if (checked) {
                panel.classList.remove('hidden');
                updateTableauPanel(selectedPathIndex);
            } else {
                panel.classList.add('hidden');
            }
        }

        function togglePic() {
            const panel = document.getElementById('ref-panel');
            const btn = document.getElementById('pic-btn');
            if (panel.classList.toggle('hidden')) {
                btn.textContent = 'PIC (show)';
            } else {
                btn.textContent = 'PIC';
            }
        }

        function selectPath(index) {
            if (index < 0 || index >= ALL_PATHS.length) return;
            selectedPathIndex = index;
            // Reset wave state fully and auto-start the wave
            waveRunning = false;
            waveCompleted = false;
            waveStepIndex = 0;
            arrowProgress = 0;
            for (let i = 0; i < ALL_PATHS.length; i++) {
                const btn = document.getElementById('path-btn-' + i);
                if (btn) btn.classList.toggle('selected', i === index);
            }
            // Log path and reduced word
            const path = ALL_PATHS[index];
            const word = getReducedWord(path);
            appendLog('Path ' + (index + 1) + ': ' + path.join(' -> '));
            appendLog('Reduced word: ' + word.map(function(v) { return 's' + v; }).join(' '));
            appendLog('');
            // Update the Young tableau display if visible
            if (document.getElementById('eg-check').checked) {
                updateTableauPanel(index);
            }
            // Automatically trigger the wave
            startWave();
        }

        function getOnesPositions(str) {
            const positions = [];
            for (let i = 0; i < str.length; i++) {
                if (str[i] === '1') positions.push(i);
            }
            return positions;
        }

        function generateAllStrings(n, k) {
            const results = [];
            function gen(cur, onesLeft, zerosLeft) {
                if (onesLeft === 0 && zerosLeft === 0) {
                    results.push(cur);
                    return;
                }
                if (onesLeft > 0) gen(cur + '1', onesLeft - 1, zerosLeft);
                if (zerosLeft > 0) gen(cur + '0', onesLeft, zerosLeft - 1);
            }
            gen('', k, n - k);
            return results;
        }

        function applyTransposition(str, i) {
            if (i < 0 || i >= str.length - 1) return str;
            const arr = str.split('');
            [arr[i], arr[i + 1]] = [arr[i + 1], arr[i]];
            return arr.join('');
        }

        function buildGraph() {
            nodes = [];
            edges = [];
            labelToNode = new Map();

            bounds = getCanvasBounds();
            const gridSize = N;
            const gridPadding = 44;
            canvasLeft = bounds.left + gridPadding;
            canvasRight = bounds.right - 20;
            canvasTop = bounds.top + 24;
            canvasBottom = bounds.bottom - gridPadding;
            const availableWidth = canvasRight - canvasLeft;
            const availableHeight = canvasBottom - canvasTop;
            cellWidth = availableWidth / (gridSize - 1);
            cellHeight = availableHeight / (gridSize - 1);

            const allStrings = generateAllStrings(N, K);
            const stringToIndex = new Map();

            allStrings.forEach((str, i) => {
                const positions = getOnesPositions(str);
                const x = canvasLeft + positions[0] * cellWidth;
                const y = canvasBottom - positions[1] * cellHeight;
                const node = { label: str, x, y, radius: NODE_SIZE };
                nodes.push(node);
                labelToNode.set(str, node);
                stringToIndex.set(str, i);
            });

            const edgeSet = new Set();
            allStrings.forEach((str, fromIdx) => {
                for (let i = 0; i < N - 1; i++) {
                    if (str[i] !== str[i + 1]) {
                        const newStr = applyTransposition(str, i);
                        const toIdx = stringToIndex.get(newStr);
                        if (toIdx !== undefined) {
                            const key = fromIdx < toIdx ? `${fromIdx}-${toIdx}-${i}` : `${toIdx}-${fromIdx}-${i}`;
                            if (!edgeSet.has(key)) {
                                edgeSet.add(key);
                                edges.push({ from: fromIdx, to: toIdx, transposition: i });
                            }
                        }
                    }
                }
            });
        }

        function getNodeByLabel(label) {
            return labelToNode.get(label);
        }

        // Draw a wavy directed arrow from (x1,y1) to (x2,y2). t in [0,1] draws from start to t along the wave.
        function drawWavyArrow(x1, y1, x2, y2, t, drawArrowhead) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const len = Math.sqrt(dx * dx + dy * dy);
            if (len < 1) return;
            const ux = dx / len;
            const uy = dy / len;
            const perpX = -uy;
            const perpY = ux;

            const steps = Math.max(24, Math.floor(len / 4));
            noFill();
            strokeWeight(3.5);
            stroke(80, 80, 100);

            beginShape();
            let lastX = x1, lastY = y1;
            vertex(x1, y1);

            for (let i = 1; i <= steps; i++) {
                const s = i / steps;
                if (s > t) break;
                const wave = Math.sin(s * Math.PI * WAVE_FREQUENCY) * WAVE_AMPLITUDE;
                const px = x1 + dx * s + perpX * wave;
                const py = y1 + dy * s + perpY * wave;
                vertex(px, py);
                lastX = px;
                lastY = py;
            }
            endShape();

            if (drawArrowhead && t >= 0.98) {
                const tipS = Math.min(1, t);
                const tipWave = Math.sin(tipS * Math.PI * WAVE_FREQUENCY) * WAVE_AMPLITUDE;
                const tipX = x1 + dx * tipS + perpX * tipWave;
                const tipY = y1 + dy * tipS + perpY * tipWave;
                const arrLen = 14;
                const backX = tipX - ux * arrLen;
                const backY = tipY - uy * arrLen;
                fill(80, 80, 100);
                noStroke();
                triangle(tipX, tipY, backX + perpX * 8, backY + perpY * 8, backX - perpX * 8, backY - perpY * 8);
            }
        }

        function getEdgeEndpoints(fromLabel, toLabel) {
            const from = getNodeByLabel(fromLabel);
            const to = getNodeByLabel(toLabel);
            if (!from || !to) return null;
            const dx = to.x - from.x;
            const dy = to.y - from.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 1) return null;
            const startX = from.x + (dx / dist) * from.radius;
            const startY = from.y + (dy / dist) * from.radius;
            const endX = to.x - (dx / dist) * to.radius;
            const endY = to.y - (dy / dist) * to.radius;
            return { startX, startY, endX, endY };
        }

        function getWaveColorForLabel(label) {
            return LABEL_COLORS[label] ?? null;
        }

        function pathPreviewHtml(path) {
            return path.map(function (label) {
                const hex = LABEL_COLORS[label] || '#37474f';
                return '<span style="color:' + hex + ';font-weight:600">' + label + '</span>';
            }).join('<span style="color:#78909c">→</span>');
        }

        function drawPathSegments(path, strokeColor, strokeW, dashed) {
            noFill();
            for (let i = 0; i < path.length - 1; i++) {
                const ep = getEdgeEndpoints(path[i], path[i + 1]);
                if (ep) {
                    stroke(strokeColor);
                    strokeWeight(strokeW);
                    if (dashed) drawingContext.setLineDash([6, 4]);
                    else drawingContext.setLineDash([]);
                    line(ep.startX, ep.startY, ep.endX, ep.endY);
                }
            }
            drawingContext.setLineDash([]);
        }

        // ── Edelman–Greene insertion ──────────────────────────
        // Extract the reduced word (sequence of 1-indexed transpositions) from a path
        function getReducedWord(path) {
            const word = [];
            for (let i = 0; i < path.length - 1; i++) {
                const a = path[i], b = path[i + 1];
                for (let j = 0; j < a.length - 1; j++) {
                    if (a[j] !== b[j]) {
                        word.push(j + 1); // 1-indexed: s_j swaps positions j and j+1
                        break;
                    }
                }
            }
            return word;
        }

        // Edelman–Greene row insertion: insert value x into row R (strictly increasing).
        // Returns the bumped value, or -1 if appended (no bump).
        function egRowInsert(row, x) {
            // If x >= last entry, append
            if (row.length === 0 || x >= row[row.length - 1]) {
                row.push(x);
                return -1; // no bump
            }
            // Find leftmost j with row[j] > x
            let j = 0;
            while (j < row.length && row[j] <= x) j++;
            const y = row[j];
            // Special case: y = x+1 and x already in the row (at position j-1)
            if (y === x + 1 && j > 0 && row[j - 1] === x) {
                // Don't modify this row; bump x+1 into next row
                return x + 1;
            }
            // Normal case: replace row[j] with x, bump y
            row[j] = x;
            return y;
        }

        // Full Edelman–Greene insertion of a reduced word.
        // Returns { P: number[][], Q: number[][] }
        function edGreeneInsert(word) {
            const P = []; // insertion tableau (rows of strictly increasing integers)
            const Q = []; // recording tableau (standard Young tableau)
            for (let step = 0; step < word.length; step++) {
                let x = word[step];
                let rowIdx = 0;
                while (true) {
                    if (rowIdx >= P.length) P.push([]);
                    if (rowIdx >= Q.length) Q.push([]);
                    const bumped = egRowInsert(P[rowIdx], x);
                    if (bumped === -1) {
                        // x was appended in row rowIdx at position P[rowIdx].length - 1
                        Q[rowIdx].push(step + 1); // 1-indexed step
                        break;
                    }
                    x = bumped;
                    rowIdx++;
                }
            }
            return { P, Q };
        }

        // Render a Young tableau (2D array) as HTML
        function tableauToHtml(tab) {
            return tab.map(function (row) {
                const cells = row.map(function (val) {
                    return '<div class="yt-cell">' + val + '</div>';
                }).join('');
                return '<div class="yt-row">' + cells + '</div>';
            }).join('');
        }

        // Update the tableau panel for the selected path
        function updateTableauPanel(pathIndex) {
            const path = ALL_PATHS[pathIndex];
            const word = getReducedWord(path);
            const { P, Q } = edGreeneInsert(word);

            // Reduced word display: s₂ s₄ s₁ s₃
            const wordHtml = word.map(function (v) {
                return '<b>s<sub>' + v + '</sub></b>';
            }).join(' ');
            const rwEl = document.getElementById('reduced-word');
            rwEl.innerHTML = '<span class="rw-label">Reduced word</span>' + wordHtml;

            document.getElementById('tableau-p').innerHTML = tableauToHtml(P);
            document.getElementById('tableau-q').innerHTML = tableauToHtml(Q);
            positionTableauPanel();
        }

        function startWave() {
            if (waveRunning) return;
            waveRunning = true;
            waveStepIndex = 0;
            arrowProgress = 0;
            // wave started
        }

        function setup() {
            const canvas = createCanvas(windowWidth, windowHeight);
            canvas.parent('canvas-container');
            textFont('JetBrains Mono');
            buildGraph();
            for (let i = 0; i < ALL_PATHS.length; i++) {
                const el = document.getElementById('path-preview-' + i);
                if (el) el.innerHTML = pathPreviewHtml(ALL_PATHS[i]);
            }
            // Tableau panel starts hidden; positioned when toggled on
            positionTableauPanel();
        }

        function positionTableauPanel() {
            const pp = document.getElementById('path-panel');
            const tp = document.getElementById('tableau-panel');
            if (pp && tp) {
                const ppRect = pp.getBoundingClientRect();
                tp.style.top = (ppRect.bottom + 8) + 'px';
            }
        }

        function draw() {
            background(200, 230, 220);
            for (let y = 0; y < height; y++) {
                const inter = map(y, 0, height, 0, 1);
                const c = lerpColor(color('#c8e6c9'), color('#b3e5fc'), inter);
                stroke(c);
                line(0, y, width, y);
            }

            bounds = getCanvasBounds();
            stroke(150, 150, 150, 50);
            strokeWeight(1);
            noFill();
            rect(bounds.left, bounds.top, bounds.right - bounds.left, bounds.bottom - bounds.top, 8);

            // Grid
            stroke(120, 120, 120, 90);
            strokeWeight(1);
            drawingContext.setLineDash([4, 4]);
            for (let i = 0; i < N; i++) {
                const x = canvasLeft + i * cellWidth;
                line(x, canvasTop, x, canvasBottom);
            }
            for (let j = 0; j < N; j++) {
                const y = canvasBottom - j * cellHeight;
                line(canvasLeft, y, canvasRight, y);
            }
            drawingContext.setLineDash([]);
            noStroke();
            fill(80, 80, 80);
            textSize(11);
            textAlign(CENTER, CENTER);
            text('X (first 1 position)', (canvasLeft + canvasRight) / 2, canvasBottom + 22);
            push();
            translate(canvasLeft - 58, (canvasTop + canvasBottom) / 2);
            rotate(-HALF_PI);
            text('Y (second 1 position)', 0, 0);
            pop();

            // Edges (static, subtle)
            strokeWeight(2);
            stroke(180, 180, 190, 140);
            edges.forEach(edge => {
                const from = nodes[edge.from];
                const to = nodes[edge.to];
                const dx = to.x - from.x;
                const dy = to.y - from.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 0) {
                    const sx = from.x + (dx / dist) * from.radius;
                    const sy = from.y + (dy / dist) * from.radius;
                    const ex = to.x - (dx / dist) * to.radius;
                    const ey = to.y - (dy / dist) * to.radius;
                    line(sx, sy, ex, ey);
                }
            });

            // Draw all 5 paths (faint), then selected path (bolder)
            const pathColors = [color(150,150,180,70), color(150,180,150,70), color(180,150,150,70), color(180,180,150,70), color(150,180,180,70)];
            for (let p = 0; p < ALL_PATHS.length; p++) {
                const isSelected = p === selectedPathIndex;
                drawPathSegments(ALL_PATHS[p], pathColors[p], isSelected ? 3 : 1.5, !isSelected);
            }
            noFill();

            // Wave animation: draw wavy arrows along the selected path
            const path = currentPath();
            if (waveRunning || waveCompleted) {
                const numArrows = path.length - 1;
                const segmentsToDraw = waveCompleted ? numArrows : waveStepIndex + 1;
                for (let i = 0; i < segmentsToDraw; i++) {
                    const ep = getEdgeEndpoints(path[i], path[i + 1]);
                    if (ep) {
                        const full = waveCompleted || i < waveStepIndex;
                        const t = full ? 1 : arrowProgress;
                        drawWavyArrow(ep.startX, ep.startY, ep.endX, ep.endY, t, full || t >= 0.98);
                    }
                }
                if (waveRunning && waveStepIndex < numArrows) {
                    arrowProgress += ARROW_SPEED;
                    if (arrowProgress >= 1) {
                        arrowProgress = 0;
                        waveStepIndex++;
                        if (waveStepIndex >= numArrows) {
                            waveRunning = false;
                            waveCompleted = true;
                        }
                    }
                }
            }

            // Nodes (always colored by vertex label when in LABEL_COLORS)
            nodes.forEach(node => {
                const nodeColor = getWaveColorForLabel(node.label) || '#e0e0e0';

                const c = color(nodeColor);
                noStroke();
                fill(0, 0, 0, 20);
                ellipse(node.x + 2, node.y + 2, node.radius * 2 + 2);
                fill(c);
                stroke(red(c) * 0.75, green(c) * 0.75, blue(c) * 0.75);
                strokeWeight(2);
                ellipse(node.x, node.y, node.radius * 2);

                noStroke();
                textSize(14);
                textAlign(CENTER, CENTER);
                textStyle(BOLD);
                const brightness = (red(c) * 299 + green(c) * 587 + blue(c) * 114) / 1000;
                fill(brightness > 150 ? 30 : 255);
                text(node.label, node.x, node.y);
                textStyle(NORMAL);
            });
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            buildGraph();
            positionTableauPanel();
        }
    </script>
</body>
</html>
