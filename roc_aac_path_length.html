<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROC ACC and Path Length</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #c8e6c9 0%, #a5d6a7 50%, #81c784 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: 'Space Grotesk', sans-serif;
            color: #1a1a1a;
        }
        
        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #1565c0, #2e7d32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

            font-size: 0.95rem;
            color: #2e5d3a;
            margin-bottom: 25px;
        }
        
        .controls {
            display: flex;

            margin-bottom: 20px;

            justify-content: center;
        }
        
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.7);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.2);
        }
        
        label {
            font-size: 0.9rem;
            color: #2e5d3a;
        }
        
        input[type="number"] {
            width: 70px;
            padding: 8px 12px;
            border: 1px solid #4caf50;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            color: #1565c0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            text-align: center;
        }
        
        input[type="number"]:focus {
            outline: 2px solid #2e7d32;
        }
        
        input[type="text"] {
            width: 300px;
            padding: 8px 12px;
            border: 1px solid #4caf50;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            color: #1565c0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
        }
        
        input[type="text"]:focus {
            outline: 2px solid #2e7d32;
        }
        
        input[type="text"]::placeholder {
            color: rgba(46, 93, 58, 0.6);
        }
        
        .error-message {
            color: #c62828;
            font-size: 0.85rem;
            margin-top: 5px;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .info-display {
            background: rgba(255, 255, 255, 0.7);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.2);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: #2e5d3a;
        }
        
        .info-display .label {
            color: #1b5e20;
        }
        
        .info-display .value {
            color: #1565c0;
            font-weight: 600;
            margin-left: 5px;
        }
        
        .info-display .separator {
            margin: 0 10px;
            color: #4a4a4a;
        }
        
        button {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #1565c0, #0d47a1);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(21, 101, 192, 0.4);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #d32f2f, #b71c1c);
            color: #fff;
        }
        
        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(211, 47, 47, 0.4);
        }
        
        .btn-tertiary {
            background: linear-gradient(135deg, #7b1fa2, #6a1b9a);
            color: #fff;
        }
        
        .btn-tertiary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(123, 31, 162, 0.4);
        }
        
        .btn-info {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);

        }
        
        .btn-info:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(46, 125, 50, 0.4);
        }
        
        #canvas-container {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        
        .info {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #2e5d3a;
            text-align: center;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <h1>ROC ACC and Path Length</h1>
    <p class="subtitle">Interactive Receiver Operating Characteristic Curve</p>
    
    <div class="controls">
        <div class="control-group">
            <label for="nInput">N (samples):</label>
            <input type="number" id="nInput" value="10" min="3" max="50">
        </div>
        <div class="control-group">
            <label for="rInput">r (ground truth):</label>
            <input type="text" id="rInput" placeholder="e.g., 0,0,1,0,1,1,1,0,1,0 (optional)">
        </div>
        <button class="btn-info" onclick="toggleMoreInfo()">SHOW MORE INFO</button>
        <button class="btn-tertiary" onclick="generateRandomR()">Generate Random r</button>
        <button class="btn-primary" onclick="regenerateData()">Generate New Data</button>
        <div id="rCounts" class="info-display" style="display: none;">
            <span class="label">r:</span>
            <span class="label">0s =</span><span class="value" id="countZeros">0</span>
            <span class="separator">|</span>
            <span class="label">1s =</span><span class="value" id="countOnes">0</span>
        </div>
        <button class="btn-secondary" onclick="animateROC()">Animate ROC</button>
    </div>
    <div id="errorMsg" class="error-message" style="text-align: center; min-height: 20px;"></div>
    
    <div id="canvas-container"></div>
    
    <p class="info">
        The ROC curve plots True Positive Rate vs False Positive Rate at various thresholds.
        AUC = 1.0 is perfect, AUC = 0.5 is random guessing.
    </p>

    <script>
        // ============ CONFIGURATION ============
        let N = 10;  // Number of samples (configurable)
        
        // ============ DATA VECTORS ============
        let p = [];  // Prediction probabilities
        let r = [];  // Ground truth labels (0 or 1)
        
        // ============ ROC DATA ============
        let rocPoints = [];
        let auc = 0;
        let aac = 0;
        let k = 0;
        let V = 0;  // Number of inversions in r
        let animationProgress = 1;
        let isAnimating = false;
        
        // ============ PER-SAMPLE METRICS ============
        let thresholds = [];
        let predictions = [];
        let tpValues = [];
        let fpValues = [];
        let tnValues = [];
        let fnValues = [];
        let tprValues = [];
        let fprValues = [];
        
        // ============ UI STATE ============
        let showMoreInfo = false;
        
        // ============ VISUAL SETTINGS ============
        const canvasWidth = 1200;
        const canvasHeight = 820;
        const rocPlotSize = 300;
        
        function setup() {
            let canvas = createCanvas(canvasWidth, canvasHeight);
            canvas.parent('canvas-container');
            textFont('JetBrains Mono, monospace');
            generateSyntheticData();
            calculateROC();
            
            // Calculate and display initial counts of 0s and 1s in r
            let countZeros = r.filter(x => x === 0).length;
            let countOnes = r.filter(x => x === 1).length;
            
            document.getElementById('countZeros').textContent = countZeros;
            document.getElementById('countOnes').textContent = countOnes;
            document.getElementById('rCounts').style.display = 'block';
        }
        
        function generateSyntheticData() {
            // Clear any previous error messages
            document.getElementById('errorMsg').textContent = '';
            
            N = parseInt(document.getElementById('nInput').value) || 10;
            N = constrain(N, 3, 50);
            
            p = [];
            r = [];
            
            // Check if user provided custom r values
            let rInput = document.getElementById('rInput').value.trim();
            let customR = null;
            
            if (rInput) {
                // Parse and validate custom r values
                try {
                    customR = rInput.split(',').map(s => {
                        let val = parseInt(s.trim());
                        if (val !== 0 && val !== 1) {
                            throw new Error('Values must be 0 or 1');
                        }
                        return val;
                    });
                    
                    // Update N to match the length of custom r
                    N = customR.length;
                    document.getElementById('nInput').value = N;
                } catch (e) {
                    document.getElementById('errorMsg').textContent = 
                        '⚠ Error: r must be comma-separated binary values (0 or 1)';
                    customR = null;
                }
            }
            
            // Generate synthetic prediction probabilities and ground truth
            for (let i = 0; i < N; i++) {
                // Evenly spaced probabilities: linspace(0, 1, N, endpoint=False) + 0.05
                let prob = (i / N) + 0.05;
                p.push(prob);
                
                if (customR) {
                    // Use custom ground truth values
                    r.push(customR[i]);
                } else {
                    // Generate random ground truth with some correlation to probability
                    let threshold = random(0.3, 0.7);
                    r.push(prob > threshold ? 1 : 0);
                }
            }
        }
        
        function calculateROC() {
            // Calculate thresholds: Thold = round(p + 0.001, 3)
            thresholds = [];
            predictions = [];
            tpValues = [];
            fpValues = [];
            tnValues = [];
            fnValues = [];
            tprValues = [];
            fprValues = [];
            
            for (let i = 0; i < N; i++) {
                let thresh = Math.round((p[i] + 0.001) * 1000) / 1000;
                thresholds.push(thresh);
                
                // PRED[i] = [int(x>Th) for x in Prob]
                let pred = [];
                for (let j = 0; j < N; j++) {
                    pred.push(p[j] > thresh ? 1 : 0);
                }
                predictions.push(pred);
                
                // Calculate confusion matrix
                let tp = 0, fp = 0, tn = 0, fn = 0;
                for (let j = 0; j < N; j++) {
                    if (r[j] === 1 && pred[j] === 1) tp++;
                    else if (r[j] === 0 && pred[j] === 1) fp++;
                    else if (r[j] === 0 && pred[j] === 0) tn++;
                    else if (r[j] === 1 && pred[j] === 0) fn++;
                }
                
                tpValues.push(tp);
                fpValues.push(fp);
                tnValues.push(tn);
                fnValues.push(fn);
                
                // Calculate rates
                let tpr = (tp + fn) > 0 ? tp / (tp + fn) : 0;
                let fpr = (fp + tn) > 0 ? fp / (fp + tn) : 0;
                
                tprValues.push(tpr);
                fprValues.push(fpr);
            }
            
            // Build ROC curve points from unique FPR/TPR combinations
            rocPoints = [];
            let rocSet = new Set();
            
            // Add boundary points
            rocPoints.push({fpr: 0, tpr: 0});
            rocSet.add('0,0');
            
            for (let i = 0; i < N; i++) {
                let key = `${fprValues[i]},${tprValues[i]}`;
                if (!rocSet.has(key)) {
                    rocPoints.push({fpr: fprValues[i], tpr: tprValues[i]});
                    rocSet.add(key);
                }
            }
            
            rocPoints.push({fpr: 1, tpr: 1});
            rocSet.add('1,1');
            
            // Sort by FPR for proper curve
            rocPoints.sort((a, b) => a.fpr - b.fpr || a.tpr - b.tpr);
            
            // Calculate AUC using trapezoidal rule
            auc = 0;
            for (let i = 1; i < rocPoints.length; i++) {
                let width = rocPoints[i].fpr - rocPoints[i-1].fpr;
                let avgHeight = (rocPoints[i].tpr + rocPoints[i-1].tpr) / 2;
                auc += width * avgHeight;
            }
            
            // Calculate AAC: AAC = (1-AUC)*(N-k)*k
            k = r.filter(x => x === 1).length;
            aac = (1 - auc) * (N - k) * k;
            
            // Calculate number of inversions in r
            V = 0;
            for (let i = 0; i < N; i++) {
                for (let j = i + 1; j < N; j++) {
                    if (r[i] > r[j]) {
                        V++;
                    }
                }
            }
        }
        
        function draw() {
            // Background with gradient effect
            background(240, 248, 240);
            
            // Subtle grid pattern
            stroke(200, 230, 200);
            strokeWeight(1);
            for (let x = 0; x < width; x += 30) {
                line(x, 0, x, height);
            }
            for (let y = 0; y < height; y += 30) {
                line(0, y, width, y);
            }
            
            drawDataVectors();
            drawROCPlot();
            drawAUCInfo();
            drawAACInfo();
            drawPathLengthInfo();
            
            // Update animation
            if (isAnimating && animationProgress < 1) {
                animationProgress += 0.015;
                if (animationProgress >= 1) {
                    animationProgress = 1;
                    isAnimating = false;
                }
            }
        }
        
        function drawDataVectors() {
            let startX = 40;
            let startY = 50;
            let rowHeight = 28;
            
            // Title
            noStroke();
            fill(21, 101, 192);
            textSize(16);
            textStyle(BOLD);
            text("Data Vectors", startX, startY);
            
            textStyle(NORMAL);
            textSize(12);
            fill(46, 93, 58);
            text(`N = ${N} samples`, startX + 150, startY);
            
            // Headers
            startY += 35;
            fill(27, 94, 32);
            textSize(11);
            
            let colX = startX;
            text("Index", colX, startY);
            colX += 60;
            text("p (prob)", colX, startY);
            colX += 85;
            text("r", colX, startY);
            
            if (showMoreInfo) {
                colX += 40;
                text("Thold", colX, startY);
                colX += 60;
                text("PRED", colX, startY);
                colX += 80;
                text("TP", colX, startY);
                colX += 40;
                text("FP", colX, startY);
                colX += 40;
                text("TN", colX, startY);
                colX += 40;
                text("FN", colX, startY);
                colX += 40;
            } else {
                colX += 40;
            }
            
            text("FPR", colX, startY);
            colX += 80;
            text("TPR", colX, startY);
            
            // Divider line
            stroke(100, 150, 100);
            strokeWeight(1);
            let lineEnd = showMoreInfo ? startX + 720 : startX + 380;
            line(startX, startY + 8, lineEnd, startY + 8);
            
            // Data rows
            startY += 25;
            let maxRows = min(N, 16);
            
            for (let i = 0; i < maxRows; i++) {
                let y = startY + i * rowHeight;
                
                colX = startX;
                
                // Index
                noStroke();
                fill(60, 60, 60);
                textSize(11);
                text(i.toString(), colX + 10, y);
                colX += 60;
                
                // Probability with color gradient
                let pColor = lerpColor(color(198, 40, 40), color(27, 94, 32), p[i]);
                fill(pColor);
                text(p[i].toFixed(4), colX, y);
                colX += 85;
                
                // Ground truth with distinct colors
                fill(r[i] === 1 ? color(27, 94, 32) : color(198, 40, 40));
                text(r[i].toString(), colX + 5, y);
                
                if (showMoreInfo) {
                    colX += 40;
                    
                    // Threshold
                    fill(55, 55, 55);
                    text(thresholds[i].toFixed(3), colX, y);
                    colX += 60;
                    
                    // PRED (show as comma-separated)
                    fill(70, 70, 70);
                    textSize(9);
                    let predStr = predictions[i].join(',');
                    if (predStr.length > 10) predStr = predStr.substring(0, 10) + '...';
                    text(predStr, colX, y);
                    textSize(11);
                    colX += 80;
                    
                    // TP
                    fill(27, 94, 32);
                    text(tpValues[i], colX, y);
                    colX += 40;
                    
                    // FP
                    fill(198, 40, 40);
                    text(fpValues[i], colX, y);
                    colX += 40;
                    
                    // TN
                    fill(21, 101, 192);
                    text(tnValues[i], colX, y);
                    colX += 40;
                    
                    // FN
                    fill(245, 124, 0);
                    text(fnValues[i], colX, y);
                    colX += 40;
                } else {
                    colX += 40;
                }
                
                // FPR
                fill(198, 40, 40);
                text(fprValues[i].toFixed(4), colX, y);
                colX += 80;
                
                // TPR
                fill(21, 101, 192);
                text(tprValues[i].toFixed(4), colX, y);
            }
            
            if (N > maxRows) {
                fill(80, 80, 80);
                textSize(10);
                text(`... and ${N - maxRows} more rows`, startX + 100, startY + maxRows * rowHeight);
            }
        }
        
        function drawROCPlot() {
            // Dynamic positioning based on showMoreInfo state
            let plotX = showMoreInfo ? 800 : 500;
            let plotY = 150;
            let plotSize = rocPlotSize;
            
            // Plot background
            fill(255, 255, 255);
            stroke(100, 150, 100);
            strokeWeight(2);
            rect(plotX, plotY, plotSize, plotSize, 8);
            
            // Grid lines
            stroke(200, 230, 200);
            strokeWeight(1);
            for (let i = 1; i < 10; i++) {
                let pos = i * plotSize / 10;
                line(plotX + pos, plotY, plotX + pos, plotY + plotSize);
                line(plotX, plotY + pos, plotX + plotSize, plotY + pos);
            }
            
            // Diagonal reference line (random classifier)
            stroke(150, 150, 150);
            strokeWeight(1);
            drawingContext.setLineDash([5, 5]);
            line(plotX, plotY + plotSize, plotX + plotSize, plotY);
            drawingContext.setLineDash([]);
            
            // Axis labels
            noStroke();
            fill(46, 93, 58);
            textSize(11);
            textAlign(CENTER);
            text("False Positive Rate (FPR)", plotX + plotSize/2, plotY + plotSize + 35);
            
            push();
            translate(plotX - 35, plotY + plotSize/2);
            rotate(-HALF_PI);
            text("True Positive Rate (TPR)", 0, 0);
            pop();
            
            textAlign(LEFT);
            
            // Axis tick labels
            fill(60, 60, 60);
            textSize(9);
            for (let i = 0; i <= 10; i += 2) {
                let val = i / 10;
                let xPos = plotX + val * plotSize;
                let yPos = plotY + plotSize - val * plotSize;
                text(val.toFixed(1), xPos - 8, plotY + plotSize + 15);
                text(val.toFixed(1), plotX - 25, yPos + 4);
            }
            
            // Title
            fill(198, 40, 40);
            textSize(16);
            textStyle(BOLD);
            textAlign(CENTER);
            text("ROC Curve", plotX + plotSize/2, plotY - 20);
            textStyle(NORMAL);
            textAlign(LEFT);
            
            // Draw filled area under ROC curve
            let pointsToDraw = floor(rocPoints.length * animationProgress);
            if (pointsToDraw >= 2) {
                // Fill area
                fill(21, 101, 192, 80);
                noStroke();
                beginShape();
                vertex(plotX, plotY + plotSize);
                for (let i = 0; i < pointsToDraw; i++) {
                    let x = plotX + rocPoints[i].fpr * plotSize;
                    let y = plotY + plotSize - rocPoints[i].tpr * plotSize;
                    vertex(x, y);
                }
                let lastPoint = rocPoints[pointsToDraw - 1];
                vertex(plotX + lastPoint.fpr * plotSize, plotY + plotSize);
                endShape(CLOSE);
                
                // Draw ROC curve line
                stroke(21, 101, 192);
                strokeWeight(3);
                noFill();
                beginShape();
                for (let i = 0; i < pointsToDraw; i++) {
                    let x = plotX + rocPoints[i].fpr * plotSize;
                    let y = plotY + plotSize - rocPoints[i].tpr * plotSize;
                    vertex(x, y);
                }
                endShape();
                
                // Draw points on the curve
                for (let i = 0; i < pointsToDraw; i++) {
                    let x = plotX + rocPoints[i].fpr * plotSize;
                    let y = plotY + plotSize - rocPoints[i].tpr * plotSize;
                    
                    // Glow effect
                    noStroke();
                    fill(21, 101, 192, 100);
                    ellipse(x, y, 16, 16);
                    
                    // Point
                    fill(21, 101, 192);
                    stroke(255);
                    strokeWeight(2);
                    ellipse(x, y, 8, 8);
                }
            }
        }
        
        function drawAUCInfo() {
            // Dynamic positioning based on showMoreInfo state
            let infoX = showMoreInfo ? 800 : 500;
            let infoY = 150 + rocPlotSize + 60;
            
            // AUC display box
            fill(255, 255, 255);
            stroke(100, 150, 100);
            strokeWeight(2);
            rect(infoX, infoY, rocPlotSize, 80, 10);
            
            // AUC value
            noStroke();
            fill(46, 93, 58);
            textSize(14);
            text("Area Under Curve (AUC):", infoX + 15, infoY + 28);
            
            // Animated AUC value
            let displayAUC = auc * animationProgress;
            
            // Color based on AUC value
            let aucColor;
            if (displayAUC >= 0.9) aucColor = color(27, 94, 32);
            else if (displayAUC >= 0.8) aucColor = color(56, 142, 60);
            else if (displayAUC >= 0.7) aucColor = color(245, 124, 0);
            else if (displayAUC >= 0.6) aucColor = color(230, 74, 25);
            else aucColor = color(198, 40, 40);
            
            fill(aucColor);
            textSize(32);
            textStyle(BOLD);
            text(displayAUC.toFixed(4), infoX + 15, infoY + 65);
            
            // Interpretation
            textStyle(NORMAL);
            textSize(11);
            fill(46, 93, 58);
            let interpretation = "";
            if (auc >= 0.9) interpretation = "Excellent";
            else if (auc >= 0.8) interpretation = "Good";
            else if (auc >= 0.7) interpretation = "Fair";
            else if (auc >= 0.6) interpretation = "Poor";
            else interpretation = "Fail";
            
            text("(" + interpretation + ")", infoX + 170, infoY + 65);
            
            // Statistics
            let positives = r.filter(x => x === 1).length;
            let negatives = r.filter(x => x === 0).length;
            
            fill(60, 60, 60);
            textSize(10);
            text(`Positives: ${positives}  |  Negatives: ${negatives}  |  ROC Points: ${rocPoints.length}`, 
                 infoX + 15, infoY + 100);
        }
        
        function drawAACInfo() {
            // Dynamic positioning based on showMoreInfo state
            let infoX = showMoreInfo ? 800 : 500;
            let infoY = 150 + rocPlotSize + 160;  // Below AUC display
            
            // AAC display box
            fill(255, 255, 255);
            stroke(100, 150, 100);
            strokeWeight(2);
            rect(infoX, infoY, rocPlotSize, 100, 10);
            
            // Title
            noStroke();
            fill(46, 93, 58);
            textSize(14);
            textStyle(BOLD);
            text("Area Above the Curve (AAC):", infoX + 15, infoY + 28);
            textStyle(NORMAL);
            
            // Formula
            fill(60, 60, 60);
            textSize(12);
            text("AAC = (1 - AUC) × (N - k) × k", infoX + 15, infoY + 50);
            
            // Show k value
            fill(46, 93, 58);
            textSize(11);
            text(`where k = ${k} (number of 1s in r)`, infoX + 15, infoY + 68);
            
            // AAC value
            let displayAAC = aac * animationProgress;
            fill(21, 101, 192);
            textSize(24);
            textStyle(BOLD);
            text(displayAAC.toFixed(4), infoX + 15, infoY + 95);
            textStyle(NORMAL);
        }
        
        function drawPathLengthInfo() {
            // Dynamic positioning based on showMoreInfo state
            let infoX = showMoreInfo ? 800 : 500;
            let infoY = 150 + rocPlotSize + 280;  // Below AAC display
            
            // Path length display box
            fill(255, 255, 255);
            stroke(100, 150, 100);
            strokeWeight(2);
            rect(infoX, infoY, rocPlotSize, 80, 10);
            
            // Title and explanation
            noStroke();
            fill(46, 93, 58);
            textSize(13);
            textStyle(BOLD);
            text("Shortest Path Length from r to e:", infoX + 15, infoY + 28);
            textStyle(NORMAL);
            
            // Explanation
            fill(60, 60, 60);
            textSize(11);
            text("(Number of inversions in r)", infoX + 15, infoY + 48);
            
            // V value
            fill(123, 31, 162);
            textSize(28);
            textStyle(BOLD);
            text(`L = ${V}`, infoX + 15, infoY + 75);
            textStyle(NORMAL);
        }
        
        // ============ GLOBAL FUNCTIONS ============
        window.toggleMoreInfo = function() {
            showMoreInfo = !showMoreInfo;
        }
        
        window.generateRandomR = function() {
            // Clear any previous error messages
            document.getElementById('errorMsg').textContent = '';
            
            // Get current N value
            let n = parseInt(document.getElementById('nInput').value) || 10;
            n = constrain(n, 3, 50);
            
            // Generate random binary values
            let randomR = [];
            for (let i = 0; i < n; i++) {
                randomR.push(Math.random() > 0.5 ? 1 : 0);
            }
            
            // Populate the input field with comma-separated values
            document.getElementById('rInput').value = randomR.join(',');
        }
        
        window.regenerateData = function() {
            generateSyntheticData();
            calculateROC();
            animationProgress = 1;
            isAnimating = false;
            
            // Calculate and display counts of 0s and 1s in r
            let countZeros = r.filter(x => x === 0).length;
            let countOnes = r.filter(x => x === 1).length;
            
            document.getElementById('countZeros').textContent = countZeros;
            document.getElementById('countOnes').textContent = countOnes;
            document.getElementById('rCounts').style.display = 'block';
        }
        
        window.animateROC = function() {
            animationProgress = 0;
            isAnimating = true;
        }
    </script>
</body>
</html>
