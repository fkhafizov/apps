<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area between two paths</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #e0f4ff 0%, #b8e4fc 50%, #a1d9f7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        h1 {
            font-weight: 700;
            font-size: 2.2rem;
            color: #1a4a6e;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
            letter-spacing: -0.5px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.85);
            padding: 20px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(26,74,110,0.15);
            backdrop-filter: blur(10px);
        }
        
        .input-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .input-group label {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 1.1rem;
            color: #2c5f85;
        }
        
        .input-group input {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            padding: 10px 15px;
            border: 2px solid #7ec8e3;
            border-radius: 10px;
            width: 180px;
            background: #f0faff;
            color: #1a4a6e;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 15px rgba(52,152,219,0.3);
        }
        
        .input-group input::placeholder {
            color: #a0c4d8;
        }
        
        button {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 12px 35px;
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(52,152,219,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52,152,219,0.5);
            background: linear-gradient(135deg, #5dade2 0%, #3498db 100%);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .main-area {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        
        .logs-panel {
            background: rgba(30, 40, 50, 0.95);
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(26,74,110,0.25);
            width: 280px;
            height: 600px;
            display: flex;
            flex-direction: column;
        }
        
        .logs-panel h3 {
            font-weight: 600;
            color: #7ec8e3;
            margin-bottom: 10px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logs-content {
            flex: 1;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #a0d4e8;
            line-height: 1.6;
        }
        
        .logs-content::-webkit-scrollbar {
            width: 8px;
        }
        
        .logs-content::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        
        .logs-content::-webkit-scrollbar-thumb {
            background: rgba(126, 200, 227, 0.5);
            border-radius: 4px;
        }
        
        .logs-content::-webkit-scrollbar-thumb:hover {
            background: rgba(126, 200, 227, 0.7);
        }
        
        .log-entry {
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 4px;
        }
        
        .log-entry.p1 {
            background: rgba(231, 76, 60, 0.2);
            border-left: 3px solid #e74c3c;
        }
        
        .log-entry.p2 {
            background: rgba(39, 174, 96, 0.2);
            border-left: 3px solid #27ae60;
        }
        
        .log-entry.info {
            background: rgba(52, 152, 219, 0.2);
            border-left: 3px solid #3498db;
        }
        
        .log-entry.result {
            background: rgba(155, 89, 182, 0.2);
            border-left: 3px solid #9b59b6;
        }

        #canvas-container {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(26,74,110,0.2);
        }
        
        .output-panel {
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(26,74,110,0.15);
            width: 280px;
            height: 600px;
            display: flex;
            flex-direction: column;
        }
        
        .output-panel h3 {
            font-weight: 600;
            color: #1a4a6e;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
        
        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: linear-gradient(135deg, #f8fbfd 0%, #e8f4f8 100%);
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid #d0e8f0;
        }
        
        .result-label {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 0.9rem;
            color: #2c5f85;
        }
        
        .result-value {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1.3rem;
            color: #16a085;
        }
        
        .result-value.inversions {
            color: #8e44ad;
        }
        
        .path-info {
            margin-top: 15px;
            padding: 12px;
            background: #f0f8ff;
            border-radius: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #2c5f85;
            line-height: 1.8;
        }
        
        .path-info .label {
            color: #6a9bb8;
            font-size: 0.75rem;
        }
        
        .status-message {
            margin-top: auto;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
        }
        
        .status-message.success {
            background: rgba(39, 174, 96, 0.15);
            color: #27ae60;
        }
        
        .status-message.warning {
            background: rgba(230, 126, 34, 0.15);
            color: #e67e22;
        }
        
        .legend {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e8f0;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #5a8aa8;
        }
        
        .legend-color {
            width: 24px;
            height: 4px;
            border-radius: 2px;
        }
        
        .hint {
            font-size: 0.85rem;
            color: #6a9bb8;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <h1>Area between two paths</h1>
    
    <div class="container">
        <div class="controls">
            <div class="input-group">
                <label>P1 :</label>
                <input type="text" id="p1Input" placeholder="e.g., 012 or 0 1 2">
            </div>
            <div class="input-group">
                <label>P2 :</label>
                <input type="text" id="p2Input" placeholder="e.g., 210 or 2 1 0">
            </div>
            <button id="drawBtn">DRAW</button>
            <button id="randomP2Btn">GET RANDOM P2</button>
        </div>
        
        <div class="hint">
            Directions: 0 = Right, 1 = Up, 2 = Diagonal (left-up)<br>
            Based on notes from Stanislav K. and team
        </div>
        
        <div class="main-area">
            <!-- Logs Panel (LEFT) -->
            <div class="logs-panel">
                <h3>📋 Step Log</h3>
                <div class="logs-content" id="logsContent">
                    <div class="log-entry info">Ready. Enter P1 and P2, then click DRAW.</div>
                </div>
            </div>
            
            <!-- Canvas (CENTER) -->
            <div id="canvas-container"></div>
            
            <!-- Output Panel (RIGHT) -->
            <div class="output-panel">
                <h3>📊 Results</h3>
                
                <div class="result-row">
                    <span class="result-label">Area</span>
                    <span class="result-value" id="areaValue">—</span>
                </div>
                
                <div class="result-row">
                    <span class="result-label">P2→P1 Inversions</span>
                    <span class="result-value inversions" id="inversionsValue">—</span>
                </div>
                
                <div class="path-info" id="pathInfo">
                    <div class="label">P1 Path</div>
                    <div id="p1PathDisplay">—</div>
                    <div class="label" style="margin-top: 8px;">P2 Path</div>
                    <div id="p2PathDisplay">—</div>
                </div>
                
                <div class="status-message" id="statusMessage" style="display: none;"></div>
                
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color" style="background: #e74c3c;"></div>
                        <span>P1 Path</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: #27ae60;"></div>
                        <span>P2 Path</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color" style="background: rgba(155,89,182,0.5);"></div>
                        <span>Enclosed Area</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let canvasWidth = 600;
        let canvasHeight = 600;
        let gridSize = 50;
        let originX, originY;
        
        let p1Path = [];
        let p2Path = [];
        let p1Array = [];
        let p2Array = [];
        let animProgress = 0;
        let isAnimating = false;
        let currentArea = 0;
        let currentInversions = 0;
        
        // Track animation steps for logging
        let lastLoggedP1Step = -1;
        let lastLoggedP2Step = -1;
        
        function setup() {
            let canvas = createCanvas(canvasWidth, canvasHeight);
            canvas.parent('canvas-container');
            originX = canvasWidth / 2;
            originY = canvasHeight / 2 + 50;
            
            document.getElementById('drawBtn').addEventListener('click', startDrawing);
            document.getElementById('randomP2Btn').addEventListener('click', generateRandomP2);
            
            // Pre-fill example
            document.getElementById('p1Input').value = "0 1 2";
            document.getElementById('p2Input').value = "2 1 0";
        }
        
        function clearLogs() {
            document.getElementById('logsContent').innerHTML = '';
        }
        
        function addLog(message, type = 'info') {
            let logsContent = document.getElementById('logsContent');
            let entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerHTML = message;
            logsContent.appendChild(entry);
            logsContent.scrollTop = logsContent.scrollHeight;
        }
        
        function draw() {
            drawBackground();
            drawGrid();
            drawOrigin();
            
            if (p1Path.length > 0 || p2Path.length > 0) {
                drawPaths();
            }
        }
        
        function drawBackground() {
            for (let y = 0; y < height; y++) {
                let inter = map(y, 0, height, 0, 1);
                let c = lerpColor(color(200, 230, 255), color(170, 215, 245), inter);
                stroke(c);
                line(0, y, width, y);
            }
        }
        
        function drawGrid() {
            let minX = floor(-originX / gridSize);
            let maxX = ceil((canvasWidth - originX) / gridSize);
            let minY = floor(-originY / gridSize);
            let maxY = ceil((canvasHeight - originY) / gridSize);
            
            stroke(100, 150, 180, 100);
            strokeWeight(1);
            
            for (let x = minX; x <= maxX; x++) {
                let screenX = originX + x * gridSize;
                drawDottedLine(screenX, 0, screenX, canvasHeight);
            }
            
            for (let y = minY; y <= maxY; y++) {
                let screenY = originY - y * gridSize;
                drawDottedLine(0, screenY, canvasWidth, screenY);
            }
            
            fill(80, 120, 150);
            noStroke();
            textFont('JetBrains Mono');
            textSize(12);
            textAlign(CENTER, TOP);
            
            for (let x = minX; x <= maxX; x++) {
                if (x !== 0) {
                    let screenX = originX + x * gridSize;
                    text(x, screenX, originY + 5);
                }
            }
            
            textAlign(RIGHT, CENTER);
            for (let y = minY; y <= maxY; y++) {
                if (y !== 0) {
                    let screenY = originY - y * gridSize;
                    text(y, originX - 8, screenY);
                }
            }
        }
        
        function drawDottedLine(x1, y1, x2, y2) {
            let distance = dist(x1, y1, x2, y2);
            let dotSpacing = 8;
            let numDots = floor(distance / dotSpacing);
            
            for (let i = 0; i <= numDots; i++) {
                let t = i / numDots;
                let x = lerp(x1, x2, t);
                let y = lerp(y1, y2, t);
                point(x, y);
            }
        }
        
        function drawOrigin() {
            noStroke();
            for (let r = 20; r > 0; r -= 4) {
                fill(52, 152, 219, map(r, 0, 20, 150, 20));
                ellipse(originX, originY, r * 2);
            }
            fill(255);
            ellipse(originX, originY, 8);
            
            fill(52, 73, 94);
            textSize(14);
            textAlign(LEFT, TOP);
            text("Origin (0,0)", originX + 12, originY + 5);
        }
        
        function drawPaths() {
            let progress = isAnimating ? min(animProgress, 1) : 1;
            
            if (progress >= 1 && p1Path.length > 1 && p2Path.length > 1) {
                drawFilledArea();
            }
            
            // Draw P1 path (red)
            if (p1Path.length > 1) {
                let p1Progress = isAnimating ? min(progress * 2, 1) : 1;
                let p1Step = drawAnimatedPath(p1Path, color(231, 76, 60), p1Progress, 4, 'P1');
                
                // Log P1 steps
                if (isAnimating && p1Step > lastLoggedP1Step && p1Step < p1Array.length) {
                    logStep('P1', p1Step, p1Array, p1Path);
                    lastLoggedP1Step = p1Step;
                }
            }
            
            // Draw P2 path (green)
            if (p2Path.length > 1) {
                let p2Progress = isAnimating ? max(0, (progress * 2) - 1) : 1;
                let p2Step = drawAnimatedPath(p2Path, color(39, 174, 96), p2Progress, 4, 'P2');
                
                // Log P2 steps
                if (isAnimating && p2Progress > 0 && p2Step > lastLoggedP2Step && p2Step < p2Array.length) {
                    logStep('P2', p2Step, p2Array, p2Path);
                    lastLoggedP2Step = p2Step;
                }
            }
            
            if (progress >= 1) {
                drawEndpoints();
            }
            
            if (isAnimating) {
                animProgress += 0.012;
                if (animProgress >= 1) {
                    isAnimating = false;
                    showResults();
                }
            }
        }
        
        function logStep(pathName, stepIndex, arr, path) {
            let move = arr[stepIndex];
            let moveNames = ['Right (+1,0)', 'Up (0,+1)', 'Diag (-1,+1)'];
            let from = path[stepIndex];
            let to = path[stepIndex + 1];
            let type = pathName === 'P1' ? 'p1' : 'p2';
            
            addLog(
                `<strong>${pathName}[${stepIndex}]</strong> = ${move}<br>` +
                `${moveNames[move]}<br>` +
                `(${from.x},${from.y}) → (${to.x},${to.y})`,
                type
            );
        }
        
        function drawAnimatedPath(pathPoints, pathColor, progress, weight, pathName) {
            if (pathPoints.length < 2) return -1;
            
            let totalSegments = pathPoints.length - 1;
            let segmentsToDraw = floor(progress * totalSegments);
            let partialProgress = (progress * totalSegments) % 1;
            
            strokeWeight(weight);
            stroke(pathColor);
            noFill();
            
            for (let i = 0; i < segmentsToDraw && i < totalSegments; i++) {
                let x1 = originX + pathPoints[i].x * gridSize;
                let y1 = originY - pathPoints[i].y * gridSize;
                let x2 = originX + pathPoints[i + 1].x * gridSize;
                let y2 = originY - pathPoints[i + 1].y * gridSize;
                line(x1, y1, x2, y2);
            }
            
            if (segmentsToDraw < totalSegments) {
                let i = segmentsToDraw;
                let x1 = originX + pathPoints[i].x * gridSize;
                let y1 = originY - pathPoints[i].y * gridSize;
                let x2 = originX + pathPoints[i + 1].x * gridSize;
                let y2 = originY - pathPoints[i + 1].y * gridSize;
                let px = lerp(x1, x2, partialProgress);
                let py = lerp(y1, y2, partialProgress);
                line(x1, y1, px, py);
                
                fill(pathColor);
                noStroke();
                ellipse(px, py, 10);
            }
            
            noStroke();
            fill(pathColor);
            for (let i = 0; i <= segmentsToDraw && i < pathPoints.length; i++) {
                let x = originX + pathPoints[i].x * gridSize;
                let y = originY - pathPoints[i].y * gridSize;
                ellipse(x, y, 8);
            }
            
            return segmentsToDraw;
        }
        
        function drawFilledArea() {
            let allPoints = [];
            
            for (let p of p1Path) {
                allPoints.push({x: originX + p.x * gridSize, y: originY - p.y * gridSize});
            }
            
            for (let i = p2Path.length - 1; i >= 0; i--) {
                allPoints.push({x: originX + p2Path[i].x * gridSize, y: originY - p2Path[i].y * gridSize});
            }
            
            noStroke();
            fill(155, 89, 182, 50);
            beginShape();
            for (let p of allPoints) {
                vertex(p.x, p.y);
            }
            endShape(CLOSE);
            
            stroke(155, 89, 182, 150);
            strokeWeight(2);
            noFill();
            beginShape();
            for (let p of allPoints) {
                vertex(p.x, p.y);
            }
            endShape(CLOSE);
        }
        
        function drawEndpoints() {
            if (p1Path.length > 0) {
                let end1 = p1Path[p1Path.length - 1];
                let x = originX + end1.x * gridSize;
                let y = originY - end1.y * gridSize;
                
                noStroke();
                fill(231, 76, 60);
                ellipse(x, y, 14);
                fill(255);
                ellipse(x, y, 6);
            }
            
            if (p2Path.length > 0) {
                let end2 = p2Path[p2Path.length - 1];
                let x = originX + end2.x * gridSize;
                let y = originY - end2.y * gridSize;
                
                noStroke();
                fill(39, 174, 96);
                ellipse(x, y, 14);
                fill(255);
                ellipse(x, y, 6);
            }
        }
        
        function startDrawing() {
            let p1Input = document.getElementById('p1Input').value.trim();
            let p2Input = document.getElementById('p2Input').value.trim();
            
            p1Array = parseInput(p1Input);
            p2Array = parseInput(p2Input);
            
            if (p1Array.length === 0 || p2Array.length === 0) {
                addLog('Error: Please enter valid arrays', 'info');
                return;
            }
            
            // Clear and initialize logs
            clearLogs();
            addLog(`<strong>Starting animation</strong>`, 'info');
            addLog(`P1 = [${p1Array.join(', ')}]`, 'p1');
            addLog(`P2 = [${p2Array.join(', ')}]`, 'p2');
            addLog(`—————————————`, 'info');
            
            // Reset step tracking
            lastLoggedP1Step = -1;
            lastLoggedP2Step = -1;
            
            // Generate paths
            p1Path = generatePath(p1Array);
            p2Path = generatePath(p2Array);
            
            // Calculate area and inversions
            currentArea = calculateArea(p1Path, p2Path);
            currentInversions = calculateInversions(p2Array, p1Array);
            
            // Reset output panel
            document.getElementById('areaValue').textContent = '...';
            document.getElementById('inversionsValue').textContent = '...';
            document.getElementById('statusMessage').style.display = 'none';
            
            // Start animation
            animProgress = 0;
            isAnimating = true;
        }
        
        function parseInput(input) {
            if (!input) return [];
            let cleaned = input.replace(/\s+/g, '');
            let nums = [];
            for (let char of cleaned) {
                let n = parseInt(char);
                if (!isNaN(n) && n >= 0 && n <= 2) {
                    nums.push(n);
                }
            }
            return nums;
        }
        
        function generateRandomP2() {
            let p1Input = document.getElementById('p1Input').value.trim();
            let p1Digits = parseInput(p1Input);
            
            if (p1Digits.length === 0) {
                addLog('Error: Enter P1 first', 'info');
                return;
            }
            
            // Create a copy of P1 digits and shuffle it (Fisher-Yates shuffle)
            let randomP2 = [...p1Digits];
            for (let i = randomP2.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [randomP2[i], randomP2[j]] = [randomP2[j], randomP2[i]];
            }
            
            document.getElementById('p2Input').value = randomP2.join(' ');
            addLog(`Generated random P2: [${randomP2.join(', ')}]`, 'info');
        }
        
        function generatePath(arr) {
            let path = [{x: 0, y: 0}];
            let x = 0, y = 0;
            
            for (let move of arr) {
                switch(move) {
                    case 0: x += 1; break;
                    case 1: y += 1; break;
                    case 2: x -= 1; y += 1; break;
                }
                path.push({x: x, y: y});
            }
            
            return path;
        }
        
        function calculateArea(path1, path2) {
            let polygon = [];
            
            for (let p of path1) {
                polygon.push({x: p.x, y: p.y});
            }
            
            for (let i = path2.length - 1; i >= 0; i--) {
                polygon.push({x: path2[i].x, y: path2[i].y});
            }
            
            let area = 0;
            let n = polygon.length;
            for (let i = 0; i < n; i++) {
                let j = (i + 1) % n;
                area += polygon[i].x * polygon[j].y;
                area -= polygon[j].x * polygon[i].y;
            }
            
            return Math.abs(area) / 2;
        }
        
        // Calculate inversions needed to transform P2 into P1 using bubble sort (adjacent swaps)
        function calculateInversions(p2, p1) {
            // Build position map: for each element in P1, where should it go?
            // We need to count adjacent swaps to sort P2 into P1
            
            // If arrays have different lengths or different element counts, return -1
            if (p2.length !== p1.length) return -1;
            
            // Create a copy of p2 to work with
            let arr = [...p2];
            let target = [...p1];
            let inversions = 0;
            
            // For each position, find where the correct element is and bubble it up
            for (let i = 0; i < arr.length; i++) {
                // Find where target[i] is in arr starting from position i
                let j = i;
                while (j < arr.length && arr[j] !== target[i]) {
                    j++;
                }
                
                // If we can't find it, arrays have different elements
                if (j >= arr.length) {
                    // Try to match by finding any matching element
                    // This handles cases where there are duplicates
                    let found = false;
                    for (let k = i; k < arr.length; k++) {
                        if (arr[k] === target[i]) {
                            j = k;
                            found = true;
                            break;
                        }
                    }
                    if (!found) return -1;
                }
                
                // Bubble arr[j] to position i
                while (j > i) {
                    [arr[j], arr[j-1]] = [arr[j-1], arr[j]];
                    inversions++;
                    j--;
                }
            }
            
            return inversions;
        }
        
        function showResults() {
            let p1End = p1Path[p1Path.length - 1];
            let p2End = p2Path[p2Path.length - 1];
            
            // Update output panel
            document.getElementById('areaValue').textContent = currentArea;
            document.getElementById('inversionsValue').textContent = currentInversions >= 0 ? currentInversions : 'N/A';
            
            document.getElementById('p1PathDisplay').textContent = `(0,0) → (${p1End.x}, ${p1End.y})`;
            document.getElementById('p2PathDisplay').textContent = `(0,0) → (${p2End.x}, ${p2End.y})`;
            
            // Status message
            let statusEl = document.getElementById('statusMessage');
            if (p1End.x !== p2End.x || p1End.y !== p2End.y) {
                statusEl.className = 'status-message warning';
                statusEl.innerHTML = `⚠️ Paths don't meet!<br>Endpoints differ.`;
            } else {
                statusEl.className = 'status-message success';
                statusEl.innerHTML = `✓ Paths meet at (${p1End.x}, ${p1End.y})`;
            }
            statusEl.style.display = 'block';
            
            // Log final results
            addLog(`—————————————`, 'info');
            addLog(`<strong>Animation complete</strong>`, 'result');
            addLog(`Area = <strong>${currentArea}</strong>`, 'result');
            addLog(`P2→P1 Inversions = <strong>${currentInversions}</strong>`, 'result');
            
            if (p1End.x === p2End.x && p1End.y === p2End.y) {
                addLog(`✓ Paths meet at (${p1End.x}, ${p1End.y})`, 'result');
            } else {
                addLog(`⚠️ Endpoints differ!`, 'info');
            }
        }
    </script>
