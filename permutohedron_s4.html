    <style>

        .permutations-list {

        }
        .permutations-list h4 { margin: 0 0 15px; color: #9B59B6; text-align: center; }
        .perm-entry {

<body>

<div class="main-container">
    <div class="controls">
        <h3>Bubble Sort</h3>
        
        <div class="legend">
            <span style="color: #FFD700;">● Comparing</span>
            <span style="color: #FF4136;">● Swapping</span>
            <span style="color: #2ECC40;">● Sorted</span>
        </div>
        
        <div class="control-group">
            <label for="arraySize">N:</label>
            <input type="number" id="arraySize" value="4" min="2" max="6">
        </div>
        
        <div class="control-group">
            <label for="customPerm">Custom:</label>
            <input type="text" id="customPerm" placeholder="e.g. 3,1,0,2">
        </div>
        
        <div class="control-group">
            <label for="speedSlider">Speed:</label>
            <input type="range" id="speedSlider" min="1" max="60" value="1">
        </div>
        
        <div class="control-group">
            <label for="stepsToShow">K:</label>
            <input type="number" id="stepsToShow" value="100" min="1" max="500">
        </div>
        
        <div class="control-group">
            <button id="runPauseBtn" onclick="toggleRunning()">Run</button>
            <button id="stepBtn" onclick="stepOnce()">Step</button>
            <button id="resetBtn" onclick="resetArray()">Reset</button>
        </div>
    </div>
    
    <div class="content-row">
        <div id="canvas-container"></div>
        
        <div class="step-log" id="stepLog">
            <h4>Algorithm Steps</h4>
            <div id="stepEntries">
                <div class="step-entry">Press Step or Run to begin sorting...</div>
            </div>
        </div>
    </div>
    
    <div class="bottom-section">
        <div class="permutations-section">
            <div class="perm-column">
                <button id="showPermBtn" class="perm-btn" onclick="showPermutations()">SHOW PERMUTATIONS in Random Order</button>
                <div id="permutationsContainer"></div>
            </div>
            <div class="perm-column">
                <button id="showBubblePermBtn" class="perm-btn" onclick="showBubbleSortPermutations()">SHOW BUBBLE SORTED PERMUTATIONS</button>
                <div id="bubblePermutationsContainer"></div>
            </div>
        </div>
        <div class="graph-column">
            <button id="showGraphBtn" class="perm-btn" onclick="showCayleyGraph()">GRAPH</button>
            <div class="graph-container" id="graphContainer"></div>
        </div>
    </div>
</div>

<script>
let values = [];
let i = 0;
let j = 0;
let barWidth = 8;
let states = []; // To track colors: -1 (normal), 0 (comparing), 1 (swapped)
let isRunning = false;
let isSorted = false;
let stepHistory = []; // Store last K steps
let passNumber = 1;
let stepCounter = 0; // Global step counter

function setup() {
    let canvas = createCanvas(800, 400);
    canvas.parent('canvas-container');
    resetArray();
    noLoop(); // Start paused
    
    // Update frame rate when speed slider changes
    document.getElementById('speedSlider').addEventListener('input', updateSpeed);
    
    // Update placeholder when array size changes
    document.getElementById('arraySize').addEventListener('change', updateCustomPermPlaceholder);
    updateCustomPermPlaceholder();
}

function updateCustomPermPlaceholder() {
    let n = getArraySize();
    let placeholder = Array.from({length: n}, (_, i) => i).reverse().join(',');
    document.getElementById('customPerm').placeholder = `e.g. ${placeholder}`;
}

function updateSpeed() {
    let speed = parseInt(document.getElementById('speedSlider').value) || 1;
    frameRate(speed);
}

function getArraySize() {
    return parseInt(document.getElementById('arraySize').value) || 3;
}

function getStepsToShow() {
    return parseInt(document.getElementById('stepsToShow').value) || 100;
}

function resetArray() {
    let n = getArraySize();
    barWidth = width / n;
    
    // Check if custom permutation is provided
    let customPermInput = document.getElementById('customPerm').value.trim();
    
    if (customPermInput) {
        // Parse custom permutation
        let customPerm = parseCustomPermutation(customPermInput, n);
        if (customPerm) {
            values = customPerm;
        } else {
            // Invalid custom permutation, show error and use random
            alert(`Invalid permutation! Please enter ${n} unique numbers from 0 to ${n-1}, separated by commas.\nExample: ${Array.from({length: n}, (_, i) => i).reverse().join(',')}\n\nUsing random permutation instead.`);
            values = generateRandomPermutation(n);
        }
    } else {
        // No custom permutation, create random one
        values = generateRandomPermutation(n);
    }
    
    states = new Array(n).fill(-1);
    
    // Store the original order when array is created
    originalOrder = values.slice();
    
    i = 0;
    j = 0;
    passNumber = 1;
    stepCounter = 0;
    isRunning = false;
    isSorted = false;
    stepHistory = [];
    updateButton();
    updateStepLog();
    document.getElementById('stepEntries').innerHTML = '<div class="step-entry">Press Step or Run to begin sorting...</div>';
    // Clear permutations display on reset
    document.getElementById('permutationsContainer').innerHTML = '';
    document.getElementById('bubblePermutationsContainer').innerHTML = '';
    document.getElementById('graphContainer').innerHTML = '';
    redraw(); // Draw once to show the new array
}

// Generate a random permutation of [0, 1, 2, ..., n-1]
function generateRandomPermutation(n) {
    let perm = [];
    for (let k = 0; k < n; k++) {
        perm.push(k);
    }
    // Fisher-Yates shuffle
    for (let k = n - 1; k > 0; k--) {
        let j = Math.floor(Math.random() * (k + 1));
        let temp = perm[k];
        perm[k] = perm[j];
        perm[j] = temp;
    }
    return perm;
}

// Parse and validate custom permutation input
function parseCustomPermutation(input, n) {
    try {
        // Split by comma and parse to integers
        let parts = input.split(',').map(s => s.trim());
        
        if (parts.length !== n) {
            return null; // Wrong length
        }
        
        let perm = [];
        let seen = new Set();
        
        for (let part of parts) {
            let num = parseInt(part);
            
            // Check if it's a valid integer
            if (isNaN(num) || num.toString() !== part) {
                return null;
            }
            
            // Check if it's in valid range [0, n-1]
            if (num < 0 || num >= n) {
                return null;
            }
            
            // Check for duplicates
            if (seen.has(num)) {
                return null;
            }
            
            seen.add(num);
            perm.push(num);
        }
        
        return perm;
    } catch (e) {
        return null;
    }
}

function toggleRunning() {
    if (isSorted) {
        resetArray();
        return;
    }
    isRunning = !isRunning;
    updateButton();
    if (isRunning) {
        updateSpeed();
        loop();
    } else {
        noLoop();
    }
}

function updateButton() {
    let btn = document.getElementById('runPauseBtn');
    if (isSorted) {
        btn.textContent = 'Run';
        btn.classList.remove('running');
    } else if (isRunning) {
        btn.textContent = 'Pause';
        btn.classList.add('running');
    } else {
        btn.textContent = 'Run';
        btn.classList.remove('running');
    }
}

// Step through one iteration manually
function stepOnce() {
    if (isSorted) {
        resetArray();
        return;
    }
    // Make sure we're paused
    isRunning = false;
    updateButton();
    noLoop();
    
    // Perform one step
    performOneStep();
    redraw();
}

// Extract the sorting step logic
function performOneStep() {
    if (i >= values.length) {
        if (!isSorted) {
            logStep('pass', `<span class="action">✓ Sorting complete!</span> All ${values.length} elements are now in ascending order.`);
            isSorted = true;
            updateButton();
        }
        return;
    }
    
    let a = values[j];
    let b = values[j + 1];
    let aVal = a;
    let bVal = b;
    
    // Highlight current comparison
    states[j] = 0; 
    states[j+1] = 0;

    // Log comparison step
    logStep('compare', 
        `<span class="action">Compare</span> index <span class="index">[${j}]</span>=<span class="value">${aVal}</span> with <span class="index">[${j+1}]</span>=<span class="value">${bVal}</span> → ${a > b ? 'Left is bigger, need to swap!' : 'Already in order, no swap needed.'}`
    );

    if (a > b) {
        swap(values, j, j + 1);
        states[j] = 1; // Mark as swapping
        logStep('swap', 
            `<span class="action">Swap!</span> Moved <span class="value">${aVal}</span> right and <span class="value">${bVal}</span> left. Larger values "bubble up" to the right.`
        );
    }

    j++;
    if (j >= values.length - i - 1) {
        // Completed a pass
        logStep('pass', 
            `<span class="action">Pass ${passNumber} complete!</span> The ${i + 1} largest element(s) are now in their final position (shown in green).`
        );
        passNumber++;
        j = 0;
        i++;
    }
}

// Log a step with explanation
function logStep(type, message) {
    stepCounter++;
    let k = getStepsToShow();
    stepHistory.push({ type, message, stepNum: stepCounter });
    if (stepHistory.length > k) {
        stepHistory.shift(); // Keep only last K steps
    }
    updateStepLog();
}

function updateStepLog() {
    let container = document.getElementById('stepEntries');
    if (stepHistory.length === 0) {
        container.innerHTML = '<div class="step-entry">Press Step or Run to begin sorting...</div>';
        return;
    }
    
    container.innerHTML = stepHistory.map(step => 
        `<div class="step-entry ${step.type}"><span class="step-num">STEP ${step.stepNum}:</span>${step.message}</div>`
    ).join('');
    
    // Auto-scroll to bottom
    let logContainer = document.getElementById('stepLog');
    logContainer.scrollTop = logContainer.scrollHeight;
}

function draw() {
    background(34);

    // Perform one step of the bubble sort (only if running and not finished)
    if (isRunning && i < values.length) {
        performOneStep();
    } else if (isRunning && i >= values.length && !isSorted) {
        logStep('pass', `<span class="action">✓ Sorting complete!</span> All ${values.length} elements are now in ascending order.`);
        isRunning = false;
        isSorted = true;
        updateButton();
        noLoop();
    }

    // Render the bars
    let n = values.length;
    let minHeight = height * 0.15;
    let maxHeight = height * 0.95;
    
    for (let k = 0; k < n; k++) {
        stroke(0);
        
        if (states[k] === 0) {
            fill('#FFD700'); // Comparing (Yellow)
        } else if (states[k] === 1) {
            fill('#FF4136'); // Swapping (Red)
        } else if (k > n - i - 1) {
            fill('#2ECC40'); // Sorted (Green)
        } else {
            fill(200);       // Default
        }
        
        // Scale permutation value (0 to n-1) to bar height
        let barHeight = (n > 1) 
            ? minHeight + (values[k] / (n - 1)) * (maxHeight - minHeight)
            : (minHeight + maxHeight) / 2;
        
        rect(k * barWidth, height - barHeight, barWidth, barHeight);
        
        // Draw value inside the bar (bold black text)
        fill(0); // Black color
        noStroke();
        textAlign(CENTER, CENTER);
        textStyle(BOLD);
        
        // Adjust font size based on bar width
        let fontSize = min(barWidth * 0.4, 20);
        textSize(fontSize);
        
        let val = values[k];
        let xPos = k * barWidth + barWidth / 2;
        let yPos = height - barHeight / 2;
        
        text(val, xPos, yPos);
        
        // Reset state after drawing for next frame
        if (states[k] !== -1) states[k] = -1;
    }
}

function swap(arr, a, b) {
    let temp = arr[a];
    arr[a] = arr[b];
    arr[b] = temp;
}

// Store original array order when created
let originalOrder = [];

// Generate all permutations of an array
function generatePermutations(arr) {
    let result = [];
    
    function permute(current, remaining) {
        if (remaining.length === 0) {
            result.push(current.slice());
            return;
        }
        for (let i = 0; i < remaining.length; i++) {
            current.push(remaining[i]);
            let newRemaining = remaining.slice(0, i).concat(remaining.slice(i + 1));
            permute(current, newRemaining);
            current.pop();
        }
    }
    
    permute([], arr);
    return result;
}

// Check if two arrays are equal
function arraysEqual(a, b) {
    if (a.length !== b.length) return false;
    for (let i = 0; i < a.length; i++) {
        if (a[i] !== b[i]) return false;
    }
    return true;
}

// Check if array is sorted in ascending order
function isSortedAscending(arr) {
    for (let i = 0; i < arr.length - 1; i++) {
        if (arr[i] > arr[i + 1]) return false;
    }
    return true;
}

// Show all permutations
function showPermutations() {
    // Get current values (already integers 0 to n-1)
    let currentValues = values.slice();
    
    // Store as original order if not already stored
    if (originalOrder.length === 0 || originalOrder.length !== currentValues.length) {
        originalOrder = currentValues.slice();
    }
    
    // Generate all permutations
    let allPerms = generatePermutations(currentValues);
    
    // Create the sorted version for comparison
    let sortedVersion = currentValues.slice().sort((a, b) => a - b);
    
    // Build the HTML
    let container = document.getElementById('permutationsContainer');
    
    let html = `
        <div class="permutations-list">
            <h4>All ${allPerms.length} Permutations (${currentValues.length}! = ${allPerms.length})</h4>
            <div class="perm-legend">
                <span style="color: #FF851B;">■ Original Order</span>
                <span style="color: #2ECC40;">■ Sorted Order</span>
            </div>
    `;
    
    for (let i = 0; i < allPerms.length; i++) {
        let perm = allPerms[i];
        let isOriginal = arraysEqual(perm, originalOrder);
        let isSorted = isSortedAscending(perm);
        
        let classes = 'perm-entry';
        if (isOriginal) classes += ' original';
        if (isSorted) classes += ' sorted';
        
        let permStr = '[' + perm.join(', ') + ']';
        
        html += `<div class="${classes}">
            <span class="perm-num">${i + 1}.</span>
            <span class="perm-values">${permStr}</span>
        </div>`;
    }
    
    html += '</div>';
    container.innerHTML = html;
}

// Show bubble sort permutations with transpositions
function showBubbleSortPermutations() {
    // Use original order (already integers 0 to n-1)
    let arr = originalOrder.slice();
    
    if (arr.length === 0) {
        arr = values.slice();
        originalOrder = arr.slice();
    }
    
    let n = arr.length;
    let steps = [];
    
    // Add initial state
    steps.push({
        perm: arr.slice(),
        transposition: null,
        isStart: true
    });
    
    // Simulate bubble sort and record each swap
    let workArr = arr.slice();
    for (let i = 0; i < n; i++) {
        for (let j = 0; j < n - i - 1; j++) {
            if (workArr[j] > workArr[j + 1]) {
                // Swap
                let temp = workArr[j];
                workArr[j] = workArr[j + 1];
                workArr[j + 1] = temp;
                
                // Record this step
                steps.push({
                    perm: workArr.slice(),
                    transposition: [j, j + 1],
                    isStart: false
                });
            }
        }
    }
    
    // Build the HTML
    let container = document.getElementById('bubblePermutationsContainer');
    
    let html = `
        <div class="permutations-list">
            <h4>Bubble Sort Steps (${steps.length} permutations)</h4>
            <div class="perm-legend">
                <span style="color: #9B59B6;">■ Start</span>
                <span style="color: #2ECC40;">■ Sorted</span>
            </div>
    `;
    
    for (let i = 0; i < steps.length; i++) {
        let step = steps[i];
        let isSorted = isSortedAscending(step.perm);
        
        let classes = 'perm-entry';
        if (step.isStart) classes += ' start';
        if (isSorted) classes += ' sorted';
        
        let permStr = '[' + step.perm.join(', ') + ']';
        let transStr = step.transposition 
            ? `(${step.transposition[0]}, ${step.transposition[1]})` 
            : '(start)';
        
        html += `<div class="${classes}">
            <span class="perm-num">${i + 1}.</span>
            <span class="transposition">${transStr}</span>
            <span class="perm-values">${permStr}</span>
        </div>`;
    }
    
    html += '</div>';
    container.innerHTML = html;
}

// Cayley graph visualization
let graphInstance = null;

// Apply adjacent transposition to a permutation
function applyTransposition(perm, k) {
    let newPerm = perm.slice();
    let temp = newPerm[k];
    newPerm[k] = newPerm[k + 1];
    newPerm[k + 1] = temp;
    return newPerm;
}

function factorial(n) {
    if (n <= 1) return 1;
    return n * factorial(n - 1);
}

// Generate all unique permutations and order them using Steinhaus-Johnson-Trotter
function generateOrderedPermutations(startPerm, n) {
    let visited = new Set();
    let orderedPerms = [];
    let current = startPerm.slice();
    
    // Add starting permutation
    orderedPerms.push(current.slice());
    visited.add(current.join(','));
    
    // Steinhaus-Johnson-Trotter: generates permutations by single adjacent swaps
    // Each permutation differs from the previous by exactly one adjacent transposition
    // and no permutation is repeated
    
    // Direction array: -1 = pointing left, +1 = pointing right
    let directions = new Array(n).fill(-1);
    
    // Find the largest mobile element
    // An element is mobile if it points to a smaller adjacent element
    function findLargestMobile() {
        let mobileIdx = -1;
        let mobileVal = -1;
        
        for (let i = 0; i < n; i++) {
            let pointsTo = i + directions[i];
            if (pointsTo >= 0 && pointsTo < n) {
                // Element at i points to a valid position
                if (current[i] > current[pointsTo] && current[i] > mobileVal) {
                    mobileVal = current[i];
                    mobileIdx = i;
                }
            }
        }
        return mobileIdx;
    }
    
    // Generate all permutations
    let numPerms = factorial(n);
    
    while (orderedPerms.length < numPerms) {
        let mobileIdx = findLargestMobile();
        
        if (mobileIdx === -1) break; // No mobile element found
        
        let swapIdx = mobileIdx + directions[mobileIdx];
        let mobileVal = current[mobileIdx];
        
        // Swap the mobile element with the element it points to
        let temp = current[mobileIdx];
        current[mobileIdx] = current[swapIdx];
        current[swapIdx] = temp;
        
        // Also swap their directions
        let tempDir = directions[mobileIdx];
        directions[mobileIdx] = directions[swapIdx];
        directions[swapIdx] = tempDir;
        
        // Reverse direction of all elements larger than the mobile element
        for (let i = 0; i < n; i++) {
            if (current[i] > mobileVal) {
                directions[i] = -directions[i];
            }
        }
        
        // Check if this permutation is unique
        let key = current.join(',');
        if (!visited.has(key)) {
            orderedPerms.push(current.slice());
            visited.add(key);
        }
    }
    
    return orderedPerms;
}

// Build all edges of the Cayley graph (all adjacent transposition connections)
function buildCayleyEdges(orderedPerms, n) {
    // Create a map from permutation string to index
    let permToIndex = {};
    for (let i = 0; i < orderedPerms.length; i++) {
        permToIndex[orderedPerms[i].join(',')] = i;
    }
    
    let edges = [];
    let edgeSet = new Set(); // To avoid duplicate edges
    
    for (let i = 0; i < orderedPerms.length; i++) {
        let perm = orderedPerms[i];
        
        // Try each adjacent transposition
        for (let k = 0; k < n - 1; k++) {
            let neighbor = applyTransposition(perm, k);
            let neighborKey = neighbor.join(',');
            let j = permToIndex[neighborKey];
            
            if (j !== undefined) {
                // Create a unique edge key (smaller index first)
                let edgeKey = Math.min(i, j) + '-' + Math.max(i, j) + '-' + k;
                
                if (!edgeSet.has(edgeKey)) {
                    edgeSet.add(edgeKey);
                    edges.push({
                        from: i,
                        to: j,
                        transposition: [k, k + 1]
                    });
                }
            }
        }
    }
    
    return edges;
}

function showCayleyGraph() {
    // Get the values to use for permutations (already integers 0 to n-1)
    let arr = originalOrder.slice();
    if (arr.length === 0) {
        arr = values.slice();
        originalOrder = arr.slice();
    }
    
    let n = arr.length;
    
    // For N=4, use 3D visualization; otherwise use 2D
    if (n === 4) {
        show3DCayleyGraph(arr, n);
    } else {
        show2DCayleyGraph(arr, n);
    }
}

// Compute the shortest path (bubble sort path) from original to sorted
function computeShortestPath(startPerm, orderedPerms, n) {
    // Create a map from permutation string to index
    let permToIndex = {};
    for (let i = 0; i < orderedPerms.length; i++) {
        permToIndex[orderedPerms[i].join(',')] = i;
    }
    
    // Simulate bubble sort to find the path
    let pathEdges = new Set();
    let current = startPerm.slice();
    
    for (let i = 0; i < n; i++) {
        for (let j = 0; j < n - i - 1; j++) {
            if (current[j] > current[j + 1]) {
                // Get current permutation index
                let fromIdx = permToIndex[current.join(',')];
                
                // Swap
                let temp = current[j];
                current[j] = current[j + 1];
                current[j + 1] = temp;
                
                // Get new permutation index
                let toIdx = permToIndex[current.join(',')];
                
                // Store edge (use sorted indices as key)
                let edgeKey = Math.min(fromIdx, toIdx) + '-' + Math.max(fromIdx, toIdx);
                pathEdges.add(edgeKey);
            }
        }
    }
    
    return pathEdges;
}

// 3D Permutohedron for N=4 (Truncated Octahedron)
function show3DCayleyGraph(arr, n) {
    let sortedArr = arr.slice().sort((a, b) => a - b);
    let orderedPerms = generateOrderedPermutations(sortedArr, n);
    let edges = buildCayleyEdges(orderedPerms, n);
    
    // Compute shortest path edges
    let pathEdges = computeShortestPath(originalOrder, orderedPerms, n);
    
    let container = document.getElementById('graphContainer');
    container.innerHTML = '';
    
    // Larger canvas for 3D view
    let canvasSize = 700;
    
    // Create canvas element for 3D rendering
    let canvas = document.createElement('canvas');
    canvas.width = canvasSize;
    canvas.height = canvasSize;
    canvas.style.cursor = 'grab';
    container.appendChild(canvas);
    
    let ctx = canvas.getContext('2d');
    
    // Calculate 3D coordinates for permutohedron
    // Standard embedding: permutation [a,b,c,d] -> 4D point (a,b,c,d)
    // Project to 3D by removing the component along (1,1,1,1)
    let coords3D = [];
    for (let perm of orderedPerms) {
        // Center the permutation around origin
        let x = perm[0] - 1.5;
        let y = perm[1] - 1.5;
        let z = perm[2] - 1.5;
        let w = perm[3] - 1.5;
        
        // Project 4D to 3D (orthogonal projection removing (1,1,1,1) direction)
        // Use basis vectors orthogonal to (1,1,1,1)
        let p3d = {
            x: (x - y) / Math.sqrt(2),
            y: (x + y - 2*z) / Math.sqrt(6),
            z: (x + y + z - 3*w) / Math.sqrt(12)
        };
        coords3D.push(p3d);
    }
    
    // Normalize coordinates to fit nicely
    let maxCoord = 0;
    for (let c of coords3D) {
        maxCoord = Math.max(maxCoord, Math.abs(c.x), Math.abs(c.y), Math.abs(c.z));
    }
    let scale = 180 / maxCoord;
    for (let c of coords3D) {
        c.x *= scale;
        c.y *= scale;
        c.z *= scale;
    }
    
    // Rotation state
    let rotX = 0.4;
    let rotY = 0.3;
    let autoRotate = true;
    let isDragging = false;
    let lastMouseX, lastMouseY;
    
    // Define colors for different transpositions
    let transColors = [
        '#FF6B6B', // (0,1) - red
        '#4ECDC4', // (1,2) - teal  
        '#FFE66D', // (2,3) - yellow
    ];
    
    // Mouse interaction
    canvas.addEventListener('mousedown', (e) => {
        isDragging = true;
        autoRotate = false;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
        canvas.style.cursor = 'grabbing';
    });
    
    canvas.addEventListener('mousemove', (e) => {
        if (isDragging) {
            let dx = e.clientX - lastMouseX;
            let dy = e.clientY - lastMouseY;
            rotY += dx * 0.01;
            rotX += dy * 0.01;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        }
    });
    
    canvas.addEventListener('mouseup', () => {
        isDragging = false;
        canvas.style.cursor = 'grab';
    });
    
    canvas.addEventListener('mouseleave', () => {
        isDragging = false;
        canvas.style.cursor = 'grab';
    });
    
    canvas.addEventListener('dblclick', () => {
        autoRotate = !autoRotate;
    });
    
    // 3D rotation and projection functions
    function rotatePoint(p) {
        // Rotate around X axis
        let y1 = p.y * Math.cos(rotX) - p.z * Math.sin(rotX);
        let z1 = p.y * Math.sin(rotX) + p.z * Math.cos(rotX);
        // Rotate around Y axis
        let x2 = p.x * Math.cos(rotY) + z1 * Math.sin(rotY);
        let z2 = -p.x * Math.sin(rotY) + z1 * Math.cos(rotY);
        return { x: x2, y: y1, z: z2 };
    }
    
    function project(p) {
        // Perspective projection
        let fov = 400;
        let distance = 500;
        let scale = fov / (distance + p.z);
        return {
            x: canvasSize/2 + p.x * scale,
            y: canvasSize/2 + p.y * scale,
            z: p.z,
            scale: scale
        };
    }
    
    // Animation loop
    function render() {
        if (autoRotate) {
            rotY += 0.008;
        }
        
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, canvasSize, canvasSize);
        
        // Transform all points
        let projected = coords3D.map(p => {
            let rotated = rotatePoint(p);
            return project(rotated);
        });
        
        // Sort edges by average z for proper rendering
        let sortedEdges = edges.map((e, idx) => ({
            ...e,
            avgZ: (projected[e.from].z + projected[e.to].z) / 2,
            idx
        })).sort((a, b) => a.avgZ - b.avgZ);
        
        // Draw edges (non-path edges first, then path edges on top)
        // First pass: draw non-path edges
        for (let edge of sortedEdges) {
            let edgeKey = Math.min(edge.from, edge.to) + '-' + Math.max(edge.from, edge.to);
            if (pathEdges.has(edgeKey)) continue; // Skip path edges for now
            
            let p1 = projected[edge.from];
            let p2 = projected[edge.to];
            let colorIndex = edge.transposition[0] % transColors.length;
            let color = transColors[colorIndex];
            
            // Fade based on depth
            let opacity = 0.3 + 0.5 * (1 - (edge.avgZ + 200) / 400);
            opacity = Math.max(0.15, Math.min(0.6, opacity));
            
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = color;
            ctx.globalAlpha = opacity;
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.globalAlpha = 1;
        }
        
        // Second pass: draw path edges (thicker and brighter)
        for (let edge of sortedEdges) {
            let edgeKey = Math.min(edge.from, edge.to) + '-' + Math.max(edge.from, edge.to);
            if (!pathEdges.has(edgeKey)) continue; // Only path edges
            
            let p1 = projected[edge.from];
            let p2 = projected[edge.to];
            let colorIndex = edge.transposition[0] % transColors.length;
            let color = transColors[colorIndex];
            
            // Path edges are always bright
            let opacity = 0.7 + 0.3 * (1 - (edge.avgZ + 200) / 400);
            opacity = Math.max(0.8, Math.min(1, opacity));
            
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = color;
            ctx.globalAlpha = opacity;
            ctx.lineWidth = 8; // 4x thicker
            ctx.stroke();
            ctx.globalAlpha = 1;
        }
        
        // Sort nodes by z for proper rendering (back to front)
        let sortedNodes = projected.map((p, idx) => ({ ...p, idx }))
            .sort((a, b) => a.z - b.z);
        
        // Draw nodes
        for (let node of sortedNodes) {
            let perm = orderedPerms[node.idx];
            let isOriginal = arraysEqual(perm, originalOrder);
            let isSorted = isSortedAscending(perm);
            
            // Size based on depth
            let baseRadius = 22;
            let radius = baseRadius * node.scale * 1.2;
            radius = Math.max(14, Math.min(28, radius));
            
            // Depth-based opacity
            let depthFactor = (node.z + 200) / 400;
            let opacity = 0.5 + 0.5 * (1 - depthFactor);
            
            ctx.globalAlpha = opacity;
            
            // Glow for special nodes
            if (isOriginal || isSorted) {
                ctx.beginPath();
                ctx.arc(node.x, node.y, radius + 5, 0, Math.PI * 2);
                if (isOriginal && isSorted) {
                    ctx.strokeStyle = '#FFD700';
                } else if (isOriginal) {
                    ctx.strokeStyle = '#FF851B';
                } else {
                    ctx.strokeStyle = '#2ECC40';
                }
                ctx.lineWidth = 3;
                ctx.stroke();
            }
            
            // Node circle
            ctx.beginPath();
            ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
            
            if (isOriginal && isSorted) {
                ctx.fillStyle = '#2ECC40';
                ctx.strokeStyle = '#FF851B';
                ctx.lineWidth = 3;
            } else if (isOriginal) {
                ctx.fillStyle = '#FF851B';
                ctx.strokeStyle = '#FFD700';
                ctx.lineWidth = 2;
            } else if (isSorted) {
                ctx.fillStyle = '#2ECC40';
                ctx.strokeStyle = '#90EE90';
                ctx.lineWidth = 2;
            } else {
                ctx.fillStyle = '#444466';
                ctx.strokeStyle = '#6666aa';
                ctx.lineWidth = 1.5;
            }
            ctx.fill();
            ctx.stroke();
            
            // Permutation text
            let fontSize = Math.max(8, Math.min(11, radius * 0.5));
            ctx.font = `bold ${fontSize}px monospace`;
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(perm.join(''), node.x, node.y);
            
            ctx.globalAlpha = 1;
        }
        
        // Draw legend
        ctx.globalAlpha = 1;
        let legendY = canvasSize - 50;
        
        // Title
        ctx.font = 'bold 14px sans-serif';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.fillText('Permutohedron S₄ (Truncated Octahedron) - Drag to rotate, double-click to toggle auto-rotate', canvasSize/2, 25);
        
        // Node legend
        ctx.font = 'bold 11px sans-serif';
        ctx.textAlign = 'left';
        
        // Original
        ctx.beginPath();
        ctx.arc(40, legendY, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#FF851B';
        ctx.fill();
        ctx.fillStyle = '#FF851B';
        ctx.fillText('Original', 55, legendY + 4);
        
        // Sorted
        ctx.beginPath();
        ctx.arc(130, legendY, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#2ECC40';
        ctx.fill();
        ctx.fillStyle = '#2ECC40';
        ctx.fillText('Sorted', 145, legendY + 4);
        
        // Edge colors
        let legendX = 220;
        for (let k = 0; k < 3; k++) {
            ctx.beginPath();
            ctx.moveTo(legendX + k * 90, legendY);
            ctx.lineTo(legendX + k * 90 + 25, legendY);
            ctx.strokeStyle = transColors[k];
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.fillStyle = transColors[k];
            ctx.fillText(`(${k},${k+1})`, legendX + k * 90 + 30, legendY + 4);
        }
        
        // Shortest path indicator
        ctx.beginPath();
        ctx.moveTo(500, legendY);
        ctx.lineTo(530, legendY);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 8;
        ctx.stroke();
        ctx.fillStyle = '#fff';
        ctx.fillText('Shortest Path', 540, legendY + 4);
        
        // Stats
        ctx.fillStyle = '#888';
        ctx.font = '11px sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(`24 vertices, 36 edges, path: ${pathEdges.size} swaps`, canvasSize - 20, legendY + 4);
        
        requestAnimationFrame(render);
    }
    
    render();
}

// 2D Cayley Graph for N != 4
function show2DCayleyGraph(arr, n) {
    let sortedArr = arr.slice().sort((a, b) => a - b);
    let orderedPerms = generateOrderedPermutations(sortedArr, n);
    let edges = buildCayleyEdges(orderedPerms, n);
    
    // Compute shortest path
    let pathEdges = computeShortestPath(originalOrder, orderedPerms, n);
    
    let container = document.getElementById('graphContainer');
    container.innerHTML = '';
    
    let numPerms = orderedPerms.length;
    let canvasSize = Math.max(500, Math.min(700, numPerms * 60 + 200));
    let radius = canvasSize * 0.38;
    let centerX = canvasSize / 2;
    let centerY = canvasSize / 2 - 20;
    
    let svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', canvasSize);
    svg.setAttribute('height', canvasSize);
    svg.style.background = 'transparent';
    
    let nodePositions = [];
    for (let i = 0; i < numPerms; i++) {
        let angle = (2 * Math.PI * i / numPerms) - Math.PI / 2;
        nodePositions.push({
            x: centerX + radius * Math.cos(angle),
            y: centerY + radius * Math.sin(angle)
        });
    }
    
    let transColors = [
        '#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3', '#F38181',
    ];
    
    // Draw non-path edges first
    for (let edge of edges) {
        let edgeKey = Math.min(edge.from, edge.to) + '-' + Math.max(edge.from, edge.to);
        if (pathEdges.has(edgeKey)) continue; // Skip path edges for now
        
        let p1 = nodePositions[edge.from];
        let p2 = nodePositions[edge.to];
        let colorIndex = edge.transposition[0] % transColors.length;
        let color = transColors[colorIndex];

            let ctrlY = midY + (dy / dist) * radius * curveFactor;
            
            let path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            let d = `M ${p1.x} ${p1.y} Q ${ctrlX} ${ctrlY} ${p2.x} ${p2.y}`;

    origText.textContent = 'Original';
    legendGroup.appendChild(origText);
    
    let sortCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    sortCircle.setAttribute('cx', 145);
    sortCircle.setAttribute('cy', legendY);
    sortCircle.setAttribute('r', 10);
    sortCircle.setAttribute('fill', '#2ECC40');
    sortCircle.setAttribute('stroke', '#90EE90');
    sortCircle.setAttribute('stroke-width', '2');
    legendGroup.appendChild(sortCircle);
    
    let sortText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    sortText.setAttribute('x', 163);
    sortText.setAttribute('y', legendY + 4);
    sortText.setAttribute('fill', '#2ECC40');
    sortText.setAttribute('font-size', '12');
    sortText.setAttribute('font-weight', 'bold');
    sortText.textContent = 'Sorted';
    legendGroup.appendChild(sortText);
    
    let legendX = 220;
    for (let k = 0; k < n - 1; k++) {
        let lx = legendX + k * 65;
        let line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', lx);
        line.setAttribute('y1', legendY);
        line.setAttribute('x2', lx + 20);
        line.setAttribute('y2', legendY);
        line.setAttribute('stroke', transColors[k % transColors.length]);
        line.setAttribute('stroke-width', '4');
        legendGroup.appendChild(line);
        
        let edgeText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        edgeText.setAttribute('x', lx + 25);
        edgeText.setAttribute('y', legendY + 4);
        edgeText.setAttribute('fill', transColors[k % transColors.length]);
        edgeText.setAttribute('font-size', '11');
        edgeText.setAttribute('font-weight', 'bold');
        edgeText.textContent = `(${k},${k+1})`;
        legendGroup.appendChild(edgeText);
    }
    
    // Path indicator
    let pathLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    let pathLegendX = legendX + (n - 1) * 65 + 20;
    pathLine.setAttribute('x1', pathLegendX);
    pathLine.setAttribute('y1', legendY);
    pathLine.setAttribute('x2', pathLegendX + 25);
    pathLine.setAttribute('y2', legendY);
    pathLine.setAttribute('stroke', '#fff');
    pathLine.setAttribute('stroke-width', '8');
    legendGroup.appendChild(pathLine);
    
    let pathText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    pathText.setAttribute('x', pathLegendX + 30);
    pathText.setAttribute('y', legendY + 4);
    pathText.setAttribute('fill', '#fff');
    pathText.setAttribute('font-size', '11');
    pathText.setAttribute('font-weight', 'bold');
    pathText.textContent = `Path (${pathEdges.size} swaps)`;
    legendGroup.appendChild(pathText);
    
    svg.appendChild(legendGroup);
    container.appendChild(svg);
}
</script>

</body>
</html>
