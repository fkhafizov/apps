<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dyck Paths Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,500;0,700;1,300&family=JetBrains+Mono:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent2: #f0883e;
    --accent3: #3fb950;
    --danger: #f85149;
    --gold: #d2a038;
  }

  body {
    font-family: 'Crimson Pro', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }

  h1 {
    font-size: 2.6rem;
    font-weight: 300;
    letter-spacing: -0.02em;
    margin-bottom: 0.3rem;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 1.15rem;
    color: var(--text-dim);
    font-style: italic;
    margin-bottom: 2rem;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  .controls label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .order-btns {
    display: flex;
    gap: 0.4rem;
  }

  .order-btns button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    width: 2.6rem;
    height: 2.6rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }

  .order-btns button:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .order-btns button.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 600;
  }

  .catalan-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    background: linear-gradient(135deg, rgba(210,160,56,0.15), rgba(240,136,62,0.15));
    border: 1px solid rgba(210,160,56,0.3);
    border-radius: 8px;
    padding: 0.5rem 1rem;
    color: var(--gold);
  }

  .catalan-badge span {
    font-weight: 600;
    color: var(--accent2);
  }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 2rem;
    align-items: start;
  }

  @media (max-width: 900px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  .canvas-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .canvas-wrap::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent3), var(--accent2));
    border-radius: 12px 12px 0 0;
  }

  canvas {
    display: block;
    width: 100%;
    border-radius: 6px;
  }

  .path-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    margin-top: 1rem;
    display: flex;
    gap: 2rem;
    flex-wrap: wrap;
    color: var(--text-dim);
  }

  .path-info .word {
    color: var(--accent);
    font-weight: 600;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
  }

  .path-info .parens {
    color: var(--accent3);
    font-size: 1.1rem;
  }

  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .path-list-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    max-height: 420px;
    overflow-y: auto;
  }

  .path-list-container::-webkit-scrollbar { width: 6px; }
  .path-list-container::-webkit-scrollbar-track { background: transparent; }
  .path-list-container::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  .path-list-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 0.75rem;
  }

  .path-item {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    padding: 0.45rem 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
    letter-spacing: 0.12em;
    color: var(--text-dim);
  }

  .path-item:hover {
    background: rgba(88,166,255,0.08);
    color: var(--text);
  }

  .path-item.active {
    background: rgba(88,166,255,0.15);
    color: var(--accent);
    font-weight: 600;
  }

  .path-item .idx {
    font-size: 0.7rem;
    color: var(--text-dim);
    opacity: 0.5;
    min-width: 24px;
  }

  .legend {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
  }

  .legend-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 0.5rem;
    font-size: 0.9rem;
  }

  .legend-row:last-child { margin-bottom: 0; }

  .legend-swatch {
    width: 28px;
    height: 4px;
    border-radius: 2px;
  }

  .nav-btns {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.5rem;
  }

  .nav-btns button {
    flex: 1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    padding: 0.6rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }

  .nav-btns button:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  .area-info {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-top: 0.8rem;
    font-style: italic;
  }

  .area-info strong {
    color: var(--gold);
    font-style: normal;
  }

  .bounce-anim {
    animation: bounceIn 0.3s ease-out;
  }

  @keyframes bounceIn {
    0% { transform: scale(0.95); opacity: 0.7; }
    60% { transform: scale(1.02); }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<h1>Dyck Paths</h1>
<p class="subtitle">Lattice paths from (0,0) to (2n,0) that never cross below the x-axis — counted by the Catalan numbers</p>

<div class="controls">
  <label>Order n =</label>
  <div class="order-btns" id="orderBtns"></div>
  <div class="catalan-badge" id="catalanBadge"></div>
</div>

<div class="main-grid">
  <div>
    <div class="canvas-wrap bounce-anim" id="canvasWrap">
      <canvas id="dyckCanvas"></canvas>
    </div>
    <div class="path-info" id="pathInfo"></div>
    <div class="area-info" id="areaInfo"></div>
  </div>

  <div class="sidebar">
    <div class="legend">
      <div class="path-list-title">Legend</div>
      <div class="legend-row">
        <div class="legend-swatch" style="background: #58a6ff;"></div>
        <span>Up step U = (1, +1)</span>
      </div>
      <div class="legend-row">
        <div class="legend-swatch" style="background: #f0883e;"></div>
        <span>Down step D = (1, −1)</span>
      </div>
      <div class="legend-row">
        <div class="legend-swatch" style="background: rgba(248,81,73,0.3); height: 12px; width: 28px; border: 1px dashed #f85149;"></div>
        <span>Forbidden zone (y &lt; 0)</span>
      </div>
      <div class="legend-row">
        <div class="legend-swatch" style="background: rgba(63,185,80,0.25); height: 12px; width: 28px;"></div>
        <span>Area under path</span>
      </div>
    </div>

    <div class="path-list-container" id="pathList"></div>

    <div class="nav-btns">
      <button onclick="prevPath()">◀ Prev</button>
      <button onclick="nextPath()">Next ▶</button>
    </div>
  </div>
</div>

<script>
// --- Generate all Dyck paths of order n ---
function generateDyckPaths(n) {
  const paths = [];
  function backtrack(path, x, y) {
    if (x === 2 * n) {
      if (y === 0) paths.push([...path]);
      return;
    }
    // Up step
    if (x + 1 <= 2 * n) {
      path.push(1);
      backtrack(path, x + 1, y + 1);
      path.pop();
    }
    // Down step
    if (y - 1 >= 0) {
      path.push(-1);
      backtrack(path, x + 1, y - 1);
      path.pop();
    }
  }
  backtrack([], 0, 0);
  return paths;
}

function catalan(n) {
  let c = 1;
  for (let i = 0; i < n; i++) c = c * 2 * (2 * i + 1) / (i + 2);
  return Math.round(c);
}

function pathToWord(path) {
  return path.map(s => s === 1 ? 'U' : 'D').join('');
}

function pathToParens(path) {
  return path.map(s => s === 1 ? '(' : ')').join('');
}

function areaUnderPath(path) {
  let area = 0, y = 0;
  for (const s of path) {
    if (s === 1) { area += y + 0.5; y++; }
    else { area += y - 0.5; y--; }
  }
  return area;
}

// --- State ---
let currentOrder = 3;
let allPaths = [];
let currentIdx = 0;
const canvas = document.getElementById('dyckCanvas');
const ctx = canvas.getContext('2d');

// --- Draw ---
function draw() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  const W = rect.width - 48;
  const H = Math.min(W * 0.55, 380);
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const n = currentOrder;
  const path = allPaths[currentIdx] || [];
  const steps = 2 * n;
  const maxY = n;

  const padL = 50, padR = 30, padT = 30, padB = 40;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;
  const dx = plotW / steps;
  const dy = plotH / (maxY + 1);

  ctx.clearRect(0, 0, W, H);

  // Forbidden zone
  const forbidY = padT + maxY * dy;
  ctx.fillStyle = 'rgba(248, 81, 73, 0.06)';
  ctx.fillRect(padL, forbidY, plotW, H - forbidY - padB + 10);
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = 'rgba(248, 81, 73, 0.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padL, forbidY);
  ctx.lineTo(padL + plotW, forbidY);
  ctx.stroke();
  ctx.setLineDash([]);

  // Grid lines
  ctx.strokeStyle = 'rgba(48, 54, 61, 0.6)';
  ctx.lineWidth = 0.5;
  for (let y = 0; y <= maxY; y++) {
    const py = padT + (maxY - y) * dy;
    ctx.beginPath();
    ctx.moveTo(padL, py);
    ctx.lineTo(padL + plotW, py);
    ctx.stroke();
  }
  for (let x = 0; x <= steps; x++) {
    const px = padL + x * dx;
    ctx.beginPath();
    ctx.moveTo(px, padT);
    ctx.lineTo(px, padT + maxY * dy);
    ctx.stroke();
  }

  // Y-axis labels
  ctx.font = '12px "JetBrains Mono", monospace';
  ctx.fillStyle = '#8b949e';
  ctx.textAlign = 'right';
  for (let y = 0; y <= maxY; y++) {
    const py = padT + (maxY - y) * dy;
    ctx.fillText(y, padL - 10, py + 4);
  }

  // X-axis labels
  ctx.textAlign = 'center';
  for (let x = 0; x <= steps; x++) {
    const px = padL + x * dx;
    ctx.fillText(x, px, padT + maxY * dy + 22);
  }

  if (path.length === 0) return;

  // Build points
  const pts = [{x: 0, y: 0}];
  let cy = 0;
  for (const s of path) {
    cy += s;
    pts.push({x: pts.length, y: cy});
  }

  function toCanvas(p) {
    return { x: padL + p.x * dx, y: padT + (maxY - p.y) * dy };
  }

  // Area fill
  ctx.beginPath();
  const p0 = toCanvas(pts[0]);
  ctx.moveTo(p0.x, p0.y);
  for (let i = 1; i < pts.length; i++) {
    const p = toCanvas(pts[i]);
    ctx.lineTo(p.x, p.y);
  }
  const baseline = padT + maxY * dy;
  ctx.lineTo(toCanvas(pts[pts.length - 1]).x, baseline);
  ctx.lineTo(p0.x, baseline);
  ctx.closePath();
  ctx.fillStyle = 'rgba(63, 185, 80, 0.1)';
  ctx.fill();

  // Draw path segments with color coding
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  for (let i = 0; i < path.length; i++) {
    const from = toCanvas(pts[i]);
    const to = toCanvas(pts[i + 1]);
    ctx.strokeStyle = path[i] === 1 ? '#58a6ff' : '#f0883e';
    ctx.beginPath();
    ctx.moveTo(from.x, from.y);
    ctx.lineTo(to.x, to.y);
    ctx.stroke();
  }

  // Draw vertices
  for (let i = 0; i < pts.length; i++) {
    const p = toCanvas(pts[i]);
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = i === 0 || i === pts.length - 1 ? '#d2a038' : '#e6edf3';
    ctx.fill();
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#0d1117';
    ctx.stroke();
  }

  // Update info
  const word = pathToWord(path);
  const parens = pathToParens(path);
  const area = areaUnderPath(path);
  document.getElementById('pathInfo').innerHTML = `
    <div>Word: <span class="word">${word}</span></div>
    <div>Parens: <span class="parens">${parens}</span></div>
    <div>Path ${currentIdx + 1} of ${allPaths.length}</div>
  `;
  document.getElementById('areaInfo').innerHTML = `Area under path = <strong>${area}</strong> (sum of heights at each step)`;
}

// --- UI ---
function setOrder(n) {
  currentOrder = n;
  allPaths = generateDyckPaths(n);
  currentIdx = 0;

  document.querySelectorAll('.order-btns button').forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === n);
  });

  document.getElementById('catalanBadge').innerHTML =
    `C<sub>${n}</sub> = <span>${catalan(n)}</span> paths`;

  renderPathList();
  const wrap = document.getElementById('canvasWrap');
  wrap.classList.remove('bounce-anim');
  void wrap.offsetWidth;
  wrap.classList.add('bounce-anim');
  draw();
}

function renderPathList() {
  const el = document.getElementById('pathList');
  el.innerHTML = `<div class="path-list-title">All Dyck Paths (n=${currentOrder})</div>`;
  allPaths.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'path-item' + (i === currentIdx ? ' active' : '');
    div.innerHTML = `<span class="idx">${i + 1}</span> ${pathToWord(p)}`;
    div.onclick = () => selectPath(i);
    el.appendChild(div);
  });
}

function selectPath(i) {
  currentIdx = i;
  renderPathList();
  draw();
}

function prevPath() {
  currentIdx = (currentIdx - 1 + allPaths.length) % allPaths.length;
  renderPathList();
  draw();
}

function nextPath() {
  currentIdx = (currentIdx + 1) % allPaths.length;
  renderPathList();
  draw();
}

// Init order buttons
const orderBtns = document.getElementById('orderBtns');
for (let n = 1; n <= 5; n++) {
  const btn = document.createElement('button');
  btn.textContent = n;
  btn.onclick = () => setOrder(n);
  orderBtns.appendChild(btn);
}

setOrder(3);
window.addEventListener('resize', draw);
</script>

</body>
</html>
